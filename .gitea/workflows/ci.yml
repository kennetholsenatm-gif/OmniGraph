# Gitea Actions — lint, format, secret scan, Trivy fs (Ansible/OpenTofu/LXC IaC).
# Register an Act runner with label ubuntu-latest (or change runs-on below). See docs/CI_CD.md.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

defaults:
  run:
    shell: bash

jobs:
  lint-and-ansible:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Ansible and YAML (AlmaLinux 9 container)
        run: bash scripts/ci/lint-ansible.sh

  tflint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: TFLint (OpenTofu)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace/opentofu \
            ghcr.io/terraform-linters/tflint:v0.54.0

  black-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Black (Python scripts/)
        run: bash scripts/ci/black-check.sh

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Gitleaks (secrets)
        run: bash scripts/ci/gitleaks.sh

  trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem (HIGH/CRITICAL)
        run: bash scripts/ci/trivy-fs.sh
