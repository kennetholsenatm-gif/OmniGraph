# Traefik static configuration — Single Pane of Glass, Zero Trust.
# TLS and client CA for mTLS; Keycloak forward auth via env (KEYCLOAK_*).
# No secrets in file; override via environment or dynamic config.
# For HTTPS: mount server cert (and optional client CA) in volume gateway_tls; see dynamic/routes.yml and docs/NETWORKS_PHASE1.md.

api:
  dashboard: true

entryPoints:
  web:
    address: ":80"
    # Production: uncomment to redirect HTTP to HTTPS. Leave commented for local dev (HTTP only).
    # http:
    #   redirections:
    #     entryPoint:
    #       to: websecure
    #       scheme: https
  websecure:
    address: ":443"

serversTransport:
  insecureSkipVerify: false

providers:
  file:
    directory: /etc/traefik/dynamic
    watch: true

log:
  level: INFO
accessLog: {}
