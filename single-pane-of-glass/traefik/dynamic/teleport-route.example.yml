# Optional Traefik route for Teleport web UI (copy into routes.yml or merge via provider).
# Teleport does not reliably work behind a path prefix (e.g. /teleport); use a dedicated hostname.
#
# 1. Add to your hosts file: 127.0.0.1 teleport.localhost
# 2. Ensure Traefik is on iam_net (see single-pane-of-glass/docker-compose.yml) so it can reach service "teleport".
# 3. Merge the router and service below into dynamic/routes.yml or load this file if your Traefik config includes it.
#
# http:
#   routers:
#     teleport:
#       rule: "Host(`teleport.localhost`)"
#       priority: 95
#       service: teleport
#       entryPoints: [web]
#     teleport-secure:
#       rule: "Host(`teleport.localhost`)"
#       priority: 95
#       service: teleport
#       entryPoints: [websecure]
#       middlewares: [secure-headers]
#   services:
#     teleport:
#       loadBalancer:
#         servers: [{ url: "http://teleport:3080" }]
#         passHostHeader: true
