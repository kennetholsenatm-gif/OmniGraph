# TLS: for HTTPS, copy traefik/dynamic/tls.yml.example to tls.yml and mount server cert + key in gateway_tls. See docs/NETWORKS_PHASE1.md.

http:
  serversTransports:
    wazuhInsecure:
      insecureSkipVerify: true

  routers:
    dashboard:
      rule: "PathPrefix(`/`)"
      priority: 100
      service: dashboard
      entryPoints: [web]
    dashboard-api:
      rule: "PathPrefix(`/api`)"
      priority: 110
      service: dashboard
      entryPoints: [web]
    dashboard-secure:
      rule: "PathPrefix(`/`)"
      priority: 100
      service: dashboard
      entryPoints: [websecure]
      middlewares: [secure-headers]
    dashboard-api-secure:
      rule: "PathPrefix(`/api`)"
      priority: 110
      service: dashboard
      entryPoints: [websecure]
      middlewares: [secure-headers]
    gitea:
      rule: "PathPrefix(`/gitea`)"
      priority: 90
      service: gitea
      entryPoints: [web]
      middlewares: [strip-gitea]
    gitea-secure:
      rule: "PathPrefix(`/gitea`)"
      priority: 90
      service: gitea
      entryPoints: [websecure]
      middlewares: [strip-gitea, secure-headers]
    zammad:
      rule: "PathPrefix(`/zammad`)"
      priority: 90
      service: zammad
      entryPoints: [web]
      middlewares: [strip-zammad]
    zammad-secure:
      rule: "PathPrefix(`/zammad`)"
      priority: 90
      service: zammad
      entryPoints: [websecure]
      middlewares: [strip-zammad, secure-headers]
    n8n:
      rule: "PathPrefix(`/n8n`)"
      priority: 90
      service: n8n
      entryPoints: [web]
      middlewares: [strip-n8n]
    n8n-secure:
      rule: "PathPrefix(`/n8n`)"
      priority: 90
      service: n8n
      entryPoints: [websecure]
      middlewares: [strip-n8n, secure-headers]
    docs:
      rule: "PathPrefix(`/docs`)"
      priority: 105
      service: docs
      entryPoints: [web]
      middlewares: [strip-docs]
    docs-secure:
      rule: "PathPrefix(`/docs`)"
      priority: 105
      service: docs
      entryPoints: [websecure]
      middlewares: [strip-docs, secure-headers]
    sonarqube:
      rule: "PathPrefix(`/sonarqube`)"
      priority: 105
      service: sonarqube
      entryPoints: [web]
      middlewares: [strip-sonarqube]
    sonarqube-secure:
      rule: "PathPrefix(`/sonarqube`)"
      priority: 105
      service: sonarqube
      entryPoints: [websecure]
      middlewares: [strip-sonarqube, secure-headers]
    wazuh:
      rule: "PathPrefix(`/wazuh`)"
      priority: 105
      service: wazuh
      entryPoints: [web]
      middlewares: [strip-wazuh]
    wazuh-secure:
      rule: "PathPrefix(`/wazuh`)"
      priority: 105
      service: wazuh
      entryPoints: [websecure]
      middlewares: [strip-wazuh, secure-headers]
    keycloak:
      rule: "PathPrefix(`/keycloak`)"
      priority: 90
      service: keycloak
      entryPoints: [web]
    keycloak-secure:
      rule: "PathPrefix(`/keycloak`)"
      priority: 90
      service: keycloak
      entryPoints: [websecure]
      middlewares: [secure-headers]
    vault:
      rule: "PathPrefix(`/vault`)"
      priority: 90
      service: vault
      entryPoints: [web]
      middlewares: [strip-vault]
    bitwarden:
      rule: "PathPrefix(`/bitwarden`)"
      priority: 90
      service: bitwarden
      entryPoints: [web]
      middlewares: [strip-bitwarden]
    freeipa:
      rule: "PathPrefix(`/freeipa`)"
      priority: 90
      service: freeipa
      entryPoints: [web]
      middlewares: [strip-freeipa]
    portainer:
      rule: "PathPrefix(`/portainer`)"
      priority: 90
      service: portainer
      entryPoints: [web]
      middlewares: [strip-portainer]
    llm:
      rule: "PathPrefix(`/llm`)"
      priority: 90
      service: bitnet
      entryPoints: [web]
      middlewares: [strip-llm]
    llm-secure:
      rule: "PathPrefix(`/llm`)"
      priority: 90
      service: bitnet
      entryPoints: [websecure]
      middlewares: [strip-llm, secure-headers]
    webhook-doc-push:
      rule: "PathPrefix(`/webhook/doc-push`)"
      priority: 200
      service: webhook-listener
      entryPoints: [web]
    webhook-doc-push-secure:
      rule: "PathPrefix(`/webhook/doc-push`)"
      priority: 200
      service: webhook-listener
      entryPoints: [websecure]
      middlewares: [secure-headers]
    webhook-docs-sync:
      rule: "PathPrefix(`/webhook/docs-sync`)"
      priority: 200
      service: webhook-listener
      entryPoints: [web]
    webhook-docs-sync-secure:
      rule: "PathPrefix(`/webhook/docs-sync`)"
      priority: 200
      service: webhook-listener
      entryPoints: [websecure]
      middlewares: [secure-headers]
    grafana:
      rule: "PathPrefix(`/grafana`)"
      priority: 90
      service: grafana
      entryPoints: [web]
      middlewares: [strip-grafana]
    grafana-secure:
      rule: "PathPrefix(`/grafana`)"
      priority: 90
      service: grafana
      entryPoints: [websecure]
      middlewares: [strip-grafana, secure-headers]
    sflow-rt:
      rule: "PathPrefix(`/sflow-rt`)"
      priority: 90
      service: sflow-rt
      entryPoints: [web]
      middlewares: [strip-sflow-rt]
    sflow-rt-secure:
      rule: "PathPrefix(`/sflow-rt`)"
      priority: 90
      service: sflow-rt
      entryPoints: [websecure]
      middlewares: [strip-sflow-rt, secure-headers]

  middlewares:
    secure-headers:
      headers:
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        stsSeconds: 31536000
    strip-gitea:
      stripPrefix:
        prefixes: ["/gitea"]
    strip-zammad:
      stripPrefix:
        prefixes: ["/zammad"]
    strip-n8n:
      stripPrefix:
        prefixes: ["/n8n"]
    strip-docs:
      stripPrefix:
        prefixes: ["/docs"]
    strip-sonarqube:
      stripPrefix:
        prefixes: ["/sonarqube"]
    strip-wazuh:
      stripPrefix:
        prefixes: ["/wazuh"]
    strip-vault:
      stripPrefix:
        prefixes: ["/vault"]
    strip-bitwarden:
      stripPrefix:
        prefixes: ["/bitwarden"]
    strip-freeipa:
      stripPrefix:
        prefixes: ["/freeipa"]
    strip-portainer:
      stripPrefix:
        prefixes: ["/portainer"]
    strip-llm:
      stripPrefix:
        prefixes: ["/llm"]
    strip-grafana:
      stripPrefix:
        prefixes: ["/grafana"]
    strip-sflow-rt:
      stripPrefix:
        prefixes: ["/sflow-rt"]

  services:
    dashboard:
      loadBalancer:
        servers: [{ url: "http://dashboard:3000" }]
        passHostHeader: true
    gitea:
      loadBalancer:
        servers: [{ url: "http://gitea:3000" }]
        passHostHeader: true
    zammad:
      loadBalancer:
        servers: [{ url: "http://zammad:8080" }]
        passHostHeader: true
    n8n:
      loadBalancer:
        servers: [{ url: "http://n8n:5678" }]
        passHostHeader: true
    keycloak:
      loadBalancer:
        servers: [{ url: "http://keycloak-proxy:80" }]
        passHostHeader: true
    vault:
      loadBalancer:
        servers: [{ url: "http://vault:8200" }]
        passHostHeader: true
    bitwarden:
      loadBalancer:
        servers: [{ url: "http://bitwarden:80" }]
        passHostHeader: true
    freeipa:
      loadBalancer:
        servers: [{ url: "http://freeipa:80" }]
        passHostHeader: true
    portainer:
      loadBalancer:
        servers: [{ url: "http://portainer:9000" }]
        passHostHeader: true
    webhook-listener:
      loadBalancer:
        servers: [{ url: "http://webhook-listener:4000" }]
        passHostHeader: true
    docs:
      loadBalancer:
        servers: [{ url: "http://docs:80" }]
        passHostHeader: true
    sonarqube:
      loadBalancer:
        servers: [{ url: "http://sonarqube:9000" }]
        passHostHeader: true
    wazuh:
      loadBalancer:
        serversTransport: wazuhInsecure
        servers:
          - url: "https://wazuh.dashboard:5601"
        passHostHeader: true
    bitnet:
      loadBalancer:
        servers: [{ url: "http://bitnet-inference:8080" }]
        passHostHeader: true
    grafana:
      loadBalancer:
        servers: [{ url: "http://grafana:3000" }]
        passHostHeader: true
    sflow-rt:
      loadBalancer:
        servers: [{ url: "http://sflow-rt:8008" }]
        passHostHeader: true
