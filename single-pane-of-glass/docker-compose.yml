# Single Pane of Glass: Traefik reverse proxy, unified dashboard, knowledge base, webhook listener.
# Zero Trust: gateway_net only; Traefik attached to backend networks for routing. mTLS + Keycloak forward auth.
# Create gateway_net first (OpenTofu or: docker network create --driver bridge --subnet 100.64.5.0/24 gateway_net).

services:
  traefik:
    image: traefik:v3.2
    container_name: gateway-traefik
    hostname: traefik
    command:
      - "--configFile=/etc/traefik/traefik.yml"
      - "--api.dashboard=true"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
    networks:
      - gateway_net
      - gitea_net
      - n8n_net
      - zammad_net
      - iam_net
      - bitwarden_net
      - portainer_net
      - llm_net
      - telemetry_net
      - docs_net
      - sonarqube_net
      - siem_net
    ports:
      - "${GATEWAY_HTTP_PORT:-80}:80"
      - "${GATEWAY_HTTPS_PORT:-443}:443"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - gateway_tls:/etc/traefik/tls:ro
    environment:
      GATEWAY_DOMAIN: "${GATEWAY_DOMAIN:-localhost}"
      KEYCLOAK_URL: "${KEYCLOAK_URL:-http://keycloak:8080}"
      KEYCLOAK_REALM: "${KEYCLOAK_REALM:-master}"
      KEYCLOAK_CLIENT_ID: "${KEYCLOAK_CLIENT_ID:-}"
      KEYCLOAK_CLIENT_SECRET: "${KEYCLOAK_CLIENT_SECRET:-}"
    restart: unless-stopped

  dashboard:
    image: node:22-alpine
    container_name: gateway-dashboard
    hostname: dashboard
    working_dir: /app
    command: ["node", "server.js"]
    networks:
      - gateway_net
      - gitea_net
    volumes:
      - ./dashboard:/app:ro
    environment:
      GITEA_URL: "${GITEA_URL:-http://gitea:3000}"
      GITEA_API_TOKEN: "${GITEA_API_TOKEN:-}"
      GITEA_WIKI_OWNER: "${GITEA_WIKI_OWNER:-}"
      GITEA_WIKI_REPO: "${GITEA_WIKI_REPO:-}"
      LMNOTEBOOK_URL: "${LMNOTEBOOK_URL:-}"
      REFRESH_SECRET: "${GATEWAY_REFRESH_SECRET:-}"
    restart: unless-stopped

  webhook-listener:
    image: node:22-alpine
    container_name: gateway-webhook-listener
    hostname: webhook-listener
    working_dir: /app
    command: ["node", "server.js"]
    networks:
      - gateway_net
    volumes:
      - ./webhook-listener:/app:ro
      # Optional: mount when DOCS_SYNC_ENABLED=true so Gitea can trigger docs-sync (Docker Engine API over socket; see docs/DOCSIFY_GITEA.md).
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WEBHOOK_HMAC_SECRET: "${WEBHOOK_HMAC_SECRET:-}"
      DASHBOARD_REFRESH_URL: "http://dashboard:3000/api/refresh"
      GATEWAY_REFRESH_SECRET: "${GATEWAY_REFRESH_SECRET:-}"
      DOCS_SYNC_ENABLED: "${DOCS_SYNC_ENABLED:-false}"
      DOCS_SYNC_CONTAINER_NAME: "${DOCS_SYNC_CONTAINER_NAME:-devsecops-docs-sync}"
      GITEA_DOCS_WEBHOOK_SECRET: "${GITEA_DOCS_WEBHOOK_SECRET:-}"
      DOCS_SYNC_REPO_FULL_NAME: "${DOCS_SYNC_REPO_FULL_NAME:-}"
    restart: unless-stopped

networks:
  gateway_net:
    external: true
  gitea_net:
    external: true
  n8n_net:
    external: true
  zammad_net:
    external: true
  iam_net:
    external: true
  bitwarden_net:
    external: true
  portainer_net:
    external: true
  llm_net:
    external: true
  telemetry_net:
    external: true
  docs_net:
    external: true
  sonarqube_net:
    external: true
  siem_net:
    external: true

volumes:
  gateway_tls:
