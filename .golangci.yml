run:
  timeout: 5m
linters:
  disable-all: true
  enable:
    - govet
    - ineffassign
    - gosec
issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
    - linters:
        - gosec
      text: "G204"
    - linters:
        - gosec
      text: "G106"
    - linters:
        - gosec
      text: "G306"
    - linters:
        - gosec
      text: "G402"
