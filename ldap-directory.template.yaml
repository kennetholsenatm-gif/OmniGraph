# LDAP directory template — groups + identities (copy `identities` to repo-root identities.yaml for Keycloak sync).
# Schema notes: devsecops.identities.schema · Narrative: docs/LDAP_ACCOUNTS_AND_GROUPS.md
# Groups LDIF: ldap-groups.template.ldif (posixGroup + memberUid)

ldap_base_dn: dc=devsecops,dc=local

# Logical groups (export to LDIF via ldap-groups.template.ldif or your IPA ipa group-add workflow)
ldap_groups:
  - cn: human-interactive
    gid_number: 10001
    description: Human privileged interactive — chatbots, applications, routine SSO
    member_uids:
      - kbolsen
      - gale
      - katelyn

  - cn: privileged-infra
    gid_number: 10002
    description: Human privileged — infrastructure automation and break-glass style ops
    member_uids:
      - kbolsen-infra
      - gale-infra

  - cn: privileged-server
    gid_number: 10003
    description: Human privileged — server OS / SSH / sudo
    member_uids:
      - kbolsen-server
      - gale-server

  - cn: agent-service-accounts
    gid_number: 10004
    description: Non-interactive binds for AI agents and automation (LDAP); prefer OIDC client credentials in Keycloak where possible
    member_uids: []
    # Example members (uncomment when created):
    # - svc-ai-mesh
    # - svc-doc-agent

# Identities: privilege_level drives Keycloak realm role via privilege_levels.json; ou places the user in LDAP OU for LDIF export.
identities:
  - uid: kbolsen
    account_kind: human_interactive
    privilege_level: admin
    ou: interactive
    cn: "Kenneth Olsen"
    mail: kenneth.olsen.atm@gmail.com
    member_of: human-interactive

  - uid: gale
    account_kind: human_interactive
    privilege_level: operator
    ou: interactive
    cn: "Gale"
    mail: gale@example.com
    member_of: human-interactive

  - uid: katelyn
    account_kind: human_interactive
    privilege_level: operator
    ou: interactive
    cn: "Katelyn"
    mail: katelyn@example.com
    member_of: human-interactive

  - uid: kbolsen-infra
    account_kind: human_privileged_infra
    privilege_level: operator
    ou: privileged-infra
    cn: "Kenneth Olsen (infrastructure)"
    mail: kbolsen-infra@example.com
    member_of: privileged-infra

  - uid: gale-infra
    account_kind: human_privileged_infra
    privilege_level: operator
    ou: privileged-infra
    cn: "Gale (infrastructure)"
    mail: gale-infra@example.com
    member_of: privileged-infra

  - uid: kbolsen-server
    account_kind: human_privileged_server
    privilege_level: operator
    ou: privileged-server
    cn: "Kenneth Olsen (server)"
    mail: kbolsen-server@example.com
    member_of: privileged-server

  - uid: gale-server
    account_kind: human_privileged_server
    privilege_level: operator
    ou: privileged-server
    cn: "Gale (server)"
    mail: gale-server@example.com
    member_of: privileged-server

  # Optional: LDAP bind-only service principals for agents (often excluded from Keycloak password-user sync)
  - uid: svc-ai-mesh
    account_kind: service_agent
    privilege_level: service_agent
    ou: service-accounts
    cn: "Service AI mesh orchestrator"
    mail: svc-ai-mesh@example.com
    member_of: agent-service-accounts

  - uid: svc-doc-agent
    account_kind: service_agent
    privilege_level: service_agent
    ou: service-accounts
    cn: "Service documentation agent"
    mail: svc-doc-agent@example.com
    member_of: agent-service-accounts
