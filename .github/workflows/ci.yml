name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25.8"

defaults:
  run:
    shell: bash

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Format (gofmt)
        run: |
          set -euo pipefail
          files=$(find cmd e2e internal pkg schemas wasm -name '*.go' 2>/dev/null || true)
          if [ -z "$files" ]; then
            echo "No Go files found for gofmt check"
            exit 1
          fi
          out=$(gofmt -l $files)
          if [ -n "$out" ]; then
            echo "::error::gofmt needed on:"$'\n'"$out"
            exit 1
          fi

      - name: Lint (golangci-lint)
        uses: golangci/golangci-lint-action@v6
        with:
          # Prebuilt releases may lag the Go toolchain; goinstall builds with setup-go’s Go (matches go.mod).
          version: v1.64.8
          install-mode: goinstall
          args: --timeout=5m ./cmd/... ./e2e/... ./internal/... ./pkg/... ./schemas/...

      - name: Vet
        run: go vet ./...

      - name: Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

      - name: Test
        run: go test ./...

      - name: Test Wasm tfpattern module
        run: cd wasm/tfpattern && go test ./...

      - name: Fuzz tfpattern (short)
        run: cd wasm/tfpattern && go test -fuzz=FuzzScan -fuzztime=20s ./...

      - name: Build workspace server
        run: mkdir -p bin && go build -o bin/omnigraph ./cmd/omnigraph

      - name: Build integration WASI plugins (NetBox, Zabbix)
        run: |
          mkdir -p bin/wasm-plugins
          GOOS=wasip1 GOARCH=wasm go build -o bin/wasm-plugins/netbox.wasm ./wasm/plugins/netbox
          GOOS=wasip1 GOARCH=wasm go build -o bin/wasm-plugins/zabbix.wasm ./wasm/plugins/zabbix

      - name: Build HCL diagnostics wasm
        run: |
          mkdir -p packages/web/public/wasm
          root="$(go env GOROOT)"
          wasm_exec="${root}/lib/wasm/wasm_exec.js"
          if [ ! -f "$wasm_exec" ]; then
            wasm_exec="${root}/misc/wasm/wasm_exec.js"
          fi
          cp "$wasm_exec" packages/web/public/wasm/
          cd wasm/hcldiag && go mod verify && GOOS=js GOARCH=wasm go build -trimpath -o ../../packages/web/public/wasm/hcldiag.wasm .

      - uses: actions/upload-artifact@v7
        with:
          name: wasm-dist
          path: packages/web/public/wasm

  web:
    needs: go
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: packages/web
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v7
        with:
          name: wasm-dist
          path: packages/web/public/wasm

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/web/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          VITE_ENABLE_WASM_SPIKE: "true"
        run: npm run build
