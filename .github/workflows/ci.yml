name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

defaults:
  run:
    shell: bash

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Format (gofmt)
        run: |
          set -euo pipefail
          files=$(find cmd internal schemas wasm -name '*.go' 2>/dev/null || true)
          if [ -z "$files" ]; then
            echo "No Go files found for gofmt check"
            exit 1
          fi
          out=$(gofmt -l $files)
          if [ -n "$out" ]; then
            echo "::error::gofmt needed on:"$'\n'"$out"
            exit 1
          fi

      - name: Lint (golangci-lint)
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          args: --timeout=5m ./cmd/... ./internal/... ./schemas/...

      - name: Vet
        run: go vet ./...

      - name: Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

      - name: Test
        run: go test ./...

      - name: Test Wasm tfpattern module
        run: cd wasm/tfpattern && go test ./...

      - name: Build
        run: go build -o omnigraph ./cmd/omnigraph

      - name: Validate sample schema
        run: ./omnigraph validate testdata/sample.omnigraph.schema

      - name: Emit graph JSON (smoke)
        run: |
          ./omnigraph graph emit testdata/sample.omnigraph.schema \
            --plan-json internal/plan/testdata/minimal-plan.json \
            --tfstate internal/state/testdata/minimal.state.json \
            | head -c 400

      - name: Build HCL diagnostics wasm
        run: |
          mkdir -p web/public/wasm
          cp "$(go env GOROOT)/misc/wasm/wasm_exec.js" web/public/wasm/
          cd wasm/hcldiag && go mod verify && GOOS=js GOARCH=wasm go build -trimpath -o ../../web/public/wasm/hcldiag.wasm .

      - uses: actions/upload-artifact@v7
        with:
          name: wasm-dist
          path: web/public/wasm

  web:
    needs: go
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: web
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v7
        with:
          name: wasm-dist
          path: web/public/wasm

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          VITE_ENABLE_WASM_SPIKE: "true"
        run: npm run build
