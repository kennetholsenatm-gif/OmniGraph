# When selected workflows fail on main, open or update a deduped issue (optional project add-on via PAT).
name: Failed run to issue

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_run:
    workflows:
      - "CI"
      - "Policy Check"
      - "CodeQL Advanced"
      - "Security"
      - "Workflow Style"
      - "Semgrep"
    types: [completed]
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  create-issue-and-add-to-project:
    if: github.event.workflow_run.conclusion == 'failure' && github.repository_owner == 'kennetholsenatm-gif'
    runs-on: ubuntu-latest
    steps:
      - name: Open or update failed-run issue (deduped by workflow name)
        id: create
        uses: actions/github-script@v8
        with:
          script: |
            const run = context.payload.workflow_run;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const stableTitle = `🚨 Workflow failed: ${run.name}`;

            const fullBody = [
              '## Failed workflow run (latest)',
              '',
              `- **Workflow:** ${run.name}`,
              `- **Run:** [#${run.run_number}](${run.html_url})`,
              `- **Branch:** \`${run.head_branch}\``,
              `- **Event:** ${run.event}`,
              `- **Triggered by:** @${run.actor?.login || 'unknown'}`,
              '',
              `**Failure type:** ${run.name.includes('Security') ? 'Security' : run.name.includes('CI') ? 'CI' : 'Infrastructure'}`,
              '',
              `Inspect the [run logs](${run.html_url}) for the root cause.`,
              '',
              '---',
              '### Next steps',
              '1. Inspect logs and fix the regression.',
              '2. Ship a fix via PR or direct push to `main` as appropriate.',
              '3. Close this issue once the workflow is green on `main`.',
              '',
              '_Additional failures append as comments; one open ticket per workflow name._'
            ].join('\n');

            const commentBody = [
              '### Another failed run',
              '',
              `- **Run:** [#${run.run_number}](${run.html_url})`,
              `- **Branch:** \`${run.head_branch}\``,
              `- **Event:** ${run.event}`,
              '',
              `Logs: ${run.html_url}`,
            ].join('\n');

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'workflow-failure',
              per_page: 100,
            });

            const existing = openIssues.find((i) => i.title === stableTitle);
            let issue;
            let createdNew = false;

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: commentBody,
              });
              const { data: full } = await github.rest.issues.get({
                owner,
                repo,
                issue_number: existing.number,
              });
              issue = full;
              createdNew = false;
            } else {
              const { data: created } = await github.rest.issues.create({
                owner,
                repo,
                title: stableTitle,
                body: fullBody,
                labels: ['bug', 'automated', 'needs-triage', 'workflow-failure'],
              });
              issue = created;
              createdNew = true;
            }

            core.setOutput('issue_node_id', issue.node_id);
            core.setOutput('issue_number', String(issue.number));
            core.setOutput('issue_url', issue.html_url);
            core.setOutput('created_new', createdNew ? 'true' : 'false');

      - name: Get project ID
        id: project
        if: steps.create.outputs.created_new == 'true'
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.ADD_TO_PROJECT_TOKEN }}
          script: |
            const result = await github.graphql(`
              query {
                user(login: "kennetholsenatm-gif") {
                  projectV2(number: 3) { id }
                }
              }
            `);
            const projectId = result?.user?.projectV2?.id;
            if (!projectId) throw new Error('Could not find project (check ADD_TO_PROJECT_TOKEN and project number)');
            core.setOutput('project_id', projectId);

      - name: Add issue to project
        id: add_to_project
        if: steps.create.outputs.created_new == 'true' && steps.create.outputs.issue_node_id != '' && steps.project.outputs.project_id != ''
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.ADD_TO_PROJECT_TOKEN }}
          script: |
            const projectId = '${{ steps.project.outputs.project_id }}';
            const contentId = '${{ steps.create.outputs.issue_node_id }}';
            await github.graphql(`
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                  item { id }
                }
              }
            `, { projectId, contentId });
            core.notice('Failed-run issue added to project #3');

      - name: Add issue to project column
        if: steps.create.outputs.created_new == 'true' && steps.add_to_project.outcome == 'success'
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.ADD_TO_PROJECT_TOKEN }}
          script: |
            const result = await github.graphql(`
              query {
                user(login: "kennetholsenatm-gif") {
                  projectV2(number: 3) {
                    id
                    items(first: 100) {
                      nodes {
                        id
                        content {
                          ... on Issue {
                            title
                          }
                        }
                      }
                    }
                  }
                }
              }
            `);
            const project = result.user.projectV2;
            const stableTitle = `🚨 Workflow failed: ${context.payload.workflow_run.name}`;
            const issueItem = project.items.nodes.find(item =>
              item.content?.title === stableTitle
            );
            if (issueItem) {
              await github.graphql(`
                mutation($itemId: ID!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: "${project.id}",
                    itemId: $itemId,
                    fieldId: "3",
                    value: "To Do"
                  }) {
                    projectV2Item {
                      id
                    }
                  }
                }
              `, { itemId: issueItem.id });
            }

      - name: Summary
        run: |
          echo "Issue #${{ steps.create.outputs.issue_number }}: ${{ steps.create.outputs.issue_url }}"
          echo "Created new issue: ${{ steps.create.outputs.created_new }}"
          if [ "${{ steps.create.outputs.created_new }}" != "true" ]; then
            echo "::notice::Appended failure to existing deduped issue (no new issue)."
          fi
          if [ "${{ steps.add_to_project.outcome }}" = "skipped" ] || [ "${{ steps.add_to_project.outcome }}" = "" ]; then
            if [ "${{ steps.create.outputs.created_new }}" = "true" ]; then
              echo "::notice title=Project not updated::Issue was NOT added to project #3."
              echo "Add repo secret ADD_TO_PROJECT_TOKEN (PAT with project scope)"
              echo "in Settings → Secrets and variables → Actions so failed-run issues appear"
              echo "at https://github.com/users/kennetholsenatm-gif/projects/3"
            fi
          else
            echo "Issue was added to project https://github.com/users/kennetholsenatm-gif/projects/3"
          fi
