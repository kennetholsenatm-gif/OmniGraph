name: Workflow Style

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".yamllint"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".yamllint"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install yamllint
        run: python -m pip install --upgrade pip yamllint

      - name: Lint workflow YAML
        run: python -m yamllint -c .yamllint .github/workflows
