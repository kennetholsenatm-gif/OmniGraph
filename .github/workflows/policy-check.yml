name: Policy Check

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches: [main, master]
    paths:
      - "**.rego"
      - "**.yaml"
      - "**.yml"
      - "**.json"
      - "**.omnigraph.schema"
  pull_request:
    branches: [main, master]
    paths:
      - "**.rego"
      - "**.yaml"
      - "**.yml"
      - "**.json"
      - "**.omnigraph.schema"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25.8"

jobs:
  policy-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build OmniGraph
        run: |
          mkdir -p bin && go build -o bin/omnigraph ./cmd/omnigraph

      - name: Validate policy files
        run: |
          echo "Validating policy files..."
          # Exclude .github (workflow YAML embeds the grep pattern and would self-match)
          find . -type f \( -name "*.rego" -o -name "*.yaml" -o -name "*.yml" \) \
            ! -path "./.git/*" ! -path "./.github/*" ! -path "./node_modules/*" | while read -r file; do
            if grep -q "omnigraph/policy/v1" "$file" 2>/dev/null; then
              echo "  Checking $file..."
              ./bin/omnigraph policy validate "$file" || exit 1
            fi
          done
          echo "All policy files validated successfully"

      - name: Validate schema files
        run: |
          echo "Validating schema files..."
          find . -name "*.omnigraph.schema" | while read file; do
            echo "  Checking $file..."
            if [ -d "policies" ]; then
              ./bin/omnigraph validate "$file" --policy-dir policies --enforce || exit 1
            elif [ -d "testdata/policies" ]; then
              ./bin/omnigraph validate "$file" --policy-dir testdata/policies --enforce || exit 1
            else
              ./bin/omnigraph validate "$file" || exit 1
            fi
          done
          echo "All schema files validated successfully"

      - name: Generate policy report
        if: success() || failure()
        run: |
          if [ -d "policies" ]; then
            echo "Generating policy compliance report..."
            ./bin/omnigraph policy report --policy-dir policies --format json --output policy-report.json || true

            if [ -f "policy-report.json" ]; then
              echo "Policy report generated: policy-report.json"
              cat policy-report.json | jq '.' 2>/dev/null || cat policy-report.json
            fi
          fi

      - name: Upload policy report
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: policy-report
          path: policy-report.json
          if-no-files-found: ignore

      - name: Comment on PR
        if: github.event_name == 'pull_request' && (success() || failure())
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');

            let report = '';
            try {
              const data = fs.readFileSync('policy-report.json', 'utf8');
              const json = JSON.parse(data);

              report = `## Policy Check Results\n\n`;
              report += `**Status:** ${json.failed > 0 ? '❌ Failed' : '✅ Passed'}\n\n`;
              report += `| Metric | Count |\n`;
              report += `|--------|-------|\n`;
              report += `| Policies Passed | ${json.passed || 0} |\n`;
              report += `| Policies Failed | ${json.failed || 0} |\n`;
              report += `| Warnings | ${json.warnings || 0} |\n\n`;

              if (json.violations && json.violations.length > 0) {
                report += `### Violations\n\n`;
                for (const v of json.violations) {
                  report += `- **[${v.severity.toUpperCase()}]** ${v.policy}: ${v.message}\n`;
                }
              }
            } catch (e) {
              report = `## Policy Check Results\n\nPolicy check completed. See workflow logs for details.`;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });
