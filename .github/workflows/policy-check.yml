name: Policy Check

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches: [main, master]
    paths:
      - "**.rego"
      - "**.yaml"
      - "**.yml"
      - "**.json"
      - "**.omnigraph.schema"
  pull_request:
    branches: [main, master]
    paths:
      - "**.rego"
      - "**.yaml"
      - "**.yml"
      - "**.json"
      - "**.omnigraph.schema"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25.8"

jobs:
  policy-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Validate policy manifests and schema files
        run: go test ./internal/policycheck/ -count=1 -run 'Test(PolicyManifestYAMLs|OmniGraphSchemaFiles)'

      - name: Generate policy report
        if: success() || failure()
        run: |
          if [ -d "policies" ]; then
            echo "Generating policy compliance report..."
            OMNIGRAPH_WRITE_POLICY_REPORT=1 go test ./internal/policycheck/ -count=1 -run TestWritePolicyReportJSON || true
            if [ -f "policy-report.json" ]; then
              echo "Policy report generated: policy-report.json"
              cat policy-report.json | jq '.' 2>/dev/null || cat policy-report.json
            fi
          fi

      - name: Upload policy report
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: policy-report
          path: policy-report.json
          if-no-files-found: ignore

      - name: Comment on PR
        if: github.event_name == 'pull_request' && (success() || failure())
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');

            let report = '';
            try {
              const data = fs.readFileSync('policy-report.json', 'utf8');
              const json = JSON.parse(data);

              report = `## Policy Check Results\n\n`;
              report += `**Status:** ${json.failed > 0 ? '❌ Failed' : '✅ Passed'}\n\n`;
              report += `| Metric | Count |\n`;
              report += `|--------|-------|\n`;
              report += `| Policies Passed | ${json.passed || 0} |\n`;
              report += `| Policies Failed | ${json.failed || 0} |\n`;
              report += `| Warnings | ${json.warnings || 0} |\n\n`;

              if (json.violations && json.violations.length > 0) {
                report += `### Violations\n\n`;
                for (const v of json.violations) {
                  report += `- **[${v.severity.toUpperCase()}]** ${v.policy}: ${v.message}\n`;
                }
              }
            } catch (e) {
              report = `## Policy Check Results\n\nPolicy check completed. See workflow logs for details.`;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });
