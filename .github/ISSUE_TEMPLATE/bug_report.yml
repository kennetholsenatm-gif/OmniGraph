name: Bug report
description: Report a problem with OmniGraph
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to fill this out.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong in one or two sentences?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: omnigraph version (if applicable)
      placeholder: e.g. 0.1.0 or git SHA

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Go version, Node version, browser (for web issues).
    validations:
      required: false
