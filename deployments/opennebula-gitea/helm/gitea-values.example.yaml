# Example Gitea Helm values — customize before use (do not commit real secrets).
# Chart: gitea-charts/gitea — validate keys against your chart version:
#   helm repo add gitea-charts https://gitea-charts.gitea.io && helm repo update
#   helm show values gitea-charts/gitea
# Some chart versions expect `gitea.config` as a single TOML string instead of nested YAML.
#
# Repo addressing (see deployments/opennebula-kvm/VLAN_MATRIX.md, docs/NETWORK_DESIGN.md):
#   - Gitea / gitea_net:        100.64.1.0/24  · VNET devsecops-gitea  · VLAN 2001
#   - Gateway / Traefik:       100.64.5.0/24  · VNET devsecops-gateway · VLAN 2005
#   - Ceph segment:            100.64.250.0/24 · VNET devsecops-ceph   · VLAN 2250
# Replace DOMAIN / ROOT_URL / example MetalLB IPs with your DNS and LoadBalancer pool.

global:
  storageClass: ceph-rbd

replicaCount: 1

# If using embedded PostgreSQL from chart, configure persistence and resources.
# Alternatively set postgresql.enabled: false and point to external DB.
postgresql:
  enabled: false

gitea:
  admin:
    username: gitea_admin
    # password: set via existingSecret or external secret manager
  config:
    APP_NAME: "Gitea (Edge)"
    RUN_MODE: production
    server:
      # Must match TLS cert SANs and what users type in the browser
      DOMAIN: git.example.com
      ROOT_URL: https://git.example.com/
      SSH_DOMAIN: git.example.com
      SSH_PORT: 2222
      DISABLE_SSH: false
    database:
      DB_TYPE: postgres
      HOST: gitea-postgresql.gitea-db.svc.cluster.local:5432
      NAME: gitea
      USER: gitea
      # PASSWD: from existing secret
    security:
      INSTALL_LOCK: true
    service:
      DISABLE_REGISTRATION: true
  oauth: {}
  ldap: {}

persistence:
  enabled: true
  size: 100Gi
  storageClass: ceph-rbd

service:
  http:
    type: ClusterIP
  ssh:
    # MetalLB: prefer an IP from devsecops-gateway (100.64.5.0/24) or devsecops-gitea (100.64.1.0/24)
    type: LoadBalancer
    loadBalancerIP: ""  # e.g. 100.64.5.21 (gateway VNET) or 100.64.1.20

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: git.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: git-example-com-tls
      hosts:
        - git.example.com

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "4"
    memory: 8Gi