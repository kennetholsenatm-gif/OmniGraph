#cloud-config
# Optional: pass to lxc launch ... --config user.user-data="$(cat docker-and-compose.user-data.yaml)"
# Or merge into your instance config. Alma/RHEL family.

package_update: true
package_upgrade: false

packages:
  - dnf-plugins-core
  - curl
  - jq
  - git

runcmd:
  - |
    set -e
    if ! command -v docker >/dev/null 2>&1; then
      dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo || true
      dnf install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin || true
      systemctl enable --now docker || true
    fi
    usermod -aG docker root || true
