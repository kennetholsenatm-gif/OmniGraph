# Reference: LXD/Incus profile "docker-nesting" (human-readable).
# Apply with: ../scripts/bootstrap-lxd-profile.sh
#
# Unprivileged Docker still failing on WSL2? Clone profile and set:
#   security.privileged: "true"
# (lab only.)

name: docker-nesting
description: Nested Docker (cgroups; apparmor relaxed for containers)
config:
  security.nesting: "true"
  security.syscalls.intercept.mknod: "true"
  security.syscalls.intercept.setxattr: "true"
  linux.kernel_modules: ip_tables,ip6_tables,iptable_nat,iptable_mangle,iptable_filter,nf_nat,nf_conntrack,bridge,br_netfilter,overlay
  raw.lxc: |
    lxc.cgroup2.devices.allow = c 10:200 rwm
    lxc.apparmor.profile = unconfined
