# Teleport OSS — single-process auth + proxy for dev/greenfield (not HA).
# Production: split auth/proxy, use ACM/Let's Encrypt certs, OIDC/SAML with Keycloak.
# Host ports (see docker-compose.iam.yml): 3080 web UI, 3023 SSH proxy, 3024 tunnel, 3025 auth (optional expose).
# Docs: docs/TELEPORT_JIT.md, docs/SYSTEMS_ARCHITECTURE.md

version: v3
teleport:
  nodename: teleport
  data_dir: /var/lib/teleport
  log:
    output: stderr
    severity: INFO

auth_service:
  enabled: true
  cluster_name: devsecops.local
  listen_addr: 0.0.0.0:3025

ssh_service:
  enabled: false

proxy_service:
  enabled: true
  web_listen_addr: 0.0.0.0:3080
  # Browser / tsh use this; override via TELEPORT_PUBLIC_WEB_ADDR in production (same host as Traefik or LB).
  public_addr: 127.0.0.1:3080
  listen_addr: 0.0.0.0:3023
  tunnel_listen_addr: 0.0.0.0:3024
  ssh_public_addr: 127.0.0.1:3023
  tunnel_public_addr: 127.0.0.1:3024
