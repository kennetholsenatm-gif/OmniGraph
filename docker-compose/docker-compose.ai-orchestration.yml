# AI Orchestration overlay: n8n-mcp proxy only. Reuses existing n8n (devsecops-n8n).
# Start with: docker compose -f docker-compose.iam.yml -f docker-compose.messaging.yml -f docker-compose.tooling.yml -f docker-compose.chatops.yml -f docker-compose.ai-orchestration.yml up -d
# Or add this file to secrets-bootstrap.ps1 compose list so it starts with the rest.

services:
  n8n-mcp:
    image: ghcr.io/czlonkowski/n8n-mcp:latest
    container_name: devsecops-n8n-mcp
    hostname: n8n-mcp
    networks:
      - n8n_net
    environment:
      # Point at existing n8n (same network)
      N8N_BASE_URL: "${N8N_BASE_URL:-http://n8n:5678}"
      N8N_API_URL: "${N8N_API_URL:-http://n8n:5678}"
      # n8n API key (create in n8n Settings → API); required for workflow tools
      N8N_API_KEY: "${N8N_API_KEY:-}"
    ports:
      - "${N8N_MCP_PORT:-3001}:3000"
    restart: unless-stopped

networks:
  n8n_net:
    external: true
