# Messaging backbone: Solace, NiFi, RabbitMQ, Kafka (100.64.10.0/24).
# Create network first: docker network create --driver bridge --subnet 100.64.10.0/24 msg_backbone_net
# Use: docker compose -f docker-compose.messaging.yml --env-file ../.env.schema up -d

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: devsecops-postgres
    hostname: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qminiwasm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-qminiwasm_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - msg_backbone_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qminiwasm} -d ${POSTGRES_DB:-qminiwasm_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: devsecops-rabbitmq
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-qminiwasm}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?Set RABBITMQ_DEFAULT_PASS}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - msg_backbone_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: devsecops-zookeeper
    hostname: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - msg_backbone_net
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: devsecops-kafka
    hostname: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - msg_backbone_net
    restart: unless-stopped

  nifi:
    image: apache/nifi:latest
    container_name: devsecops-nifi
    hostname: nifi
    environment:
      NIFI_JVM_HEAP_INIT: ${NIFI_JVM_HEAP_INIT:-2g}
      NIFI_JVM_HEAP_MAX: ${NIFI_JVM_HEAP_MAX:-4g}
      NIFI_WEB_HTTP_PORT: 8080
    volumes:
      - nifi_data:/opt/nifi/nifi-current/database/repository
      - nifi_state:/opt/nifi/nifi-current/state
    networks:
      - msg_backbone_net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  solace-pubsub:
    image: solace/solace-pubsub-standard:latest
    container_name: devsecops-solace
    hostname: solace-pubsub
    environment:
      username_admin_globalaccesslevel: admin
      username_admin_password: ${SOLACE_ADMIN_PASSWORD:?Set SOLACE_ADMIN_PASSWORD}
    shm_size: 2g
    networks:
      - msg_backbone_net
    # Solace SEMP is on 8080; accept any HTTP response as broker up (path may 404 until ready)
    healthcheck:
      test: ["CMD-SHELL", "code=$$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/); [ \"$$code\" = '200' ] || [ \"$$code\" = '401' ] || [ \"$$code\" = '404' ] || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  solace-agent-mesh:
    image: solace/solace-agent-mesh:latest
    container_name: devsecops-sam
    hostname: solace-agent-mesh
    platform: linux/amd64
    environment:
      SOLACE_BROKER_URL: ${SOLACE_BROKER_WS_URL:-ws://solace-pubsub:8008}
      SOLACE_BROKER_USERNAME: ${SOLACE_USERNAME:-admin}
      SOLACE_BROKER_PASSWORD: ${SOLACE_PASSWORD:?Set SOLACE_PASSWORD}
      SOLACE_BROKER_VPN: ${SOLACE_VPN:-default}
      LLM_SERVICE_ENDPOINT: ${LLM_SERVICE_ENDPOINT:-}
      LLM_SERVICE_API_KEY: ${LLM_SERVICE_API_KEY:-}
    depends_on:
      solace-pubsub:
        condition: service_healthy
    networks:
      - msg_backbone_net
      - agent_mesh_net
    restart: unless-stopped

networks:
  msg_backbone_net:
    external: true
  agent_mesh_net:
    external: true

volumes:
  postgres_data:
  rabbitmq_data:
  nifi_data:
  nifi_state:
