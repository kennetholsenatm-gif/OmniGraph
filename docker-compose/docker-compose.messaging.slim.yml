# Slim messaging: Postgres + RabbitMQ (+ Sonar DB init) only — no Kafka, NiFi, Solace.
# Use for lower CPU local dev or merged with IAM in one LXC (see deployments/local-lxc/README.md).
# Full stack: docker-compose.messaging.yml
# Create network first: docker network create --driver bridge --subnet 100.64.10.0/24 msg_backbone_net

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: devsecops-postgres
    hostname: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qminiwasm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-qminiwasm_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/init-pipeline-events.sql:/docker-entrypoint-initdb.d/10-pipeline-events.sql:ro
    networks:
      - msg_backbone_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qminiwasm} -d ${POSTGRES_DB:-qminiwasm_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  sonar-db-init:
    image: pgvector/pgvector:pg16
    container_name: devsecops-sonar-db-init
    hostname: sonar-db-init
    networks:
      - msg_backbone_net
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-qminiwasm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      SONAR_JDBC_PASSWORD: ${SONAR_JDBC_PASSWORD:-}
      SONAR_JDBC_USERNAME: ${SONAR_JDBC_USERNAME:-sonar}
      SONAR_JDBC_DB: ${SONAR_JDBC_DB:-sonar}
    volumes:
      - ./init-scripts/ensure-sonar-db.sh:/ensure-sonar-db.sh:ro
    entrypoint: ["/bin/bash", "/ensure-sonar-db.sh"]
    restart: "no"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: devsecops-rabbitmq
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-qminiwasm}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?Set RABBITMQ_DEFAULT_PASS}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - msg_backbone_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  msg_backbone_net:
    external: true

volumes:
  postgres_data:
  rabbitmq_data:
