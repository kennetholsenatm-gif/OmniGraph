# ChatOps: Zulip + Memcached, Redis, RabbitMQ, Postgres. Isolated stack behind Traefik.
# Networks: chatops_net (internal), gateway_net (external, for Traefik). Create chatops_net and gateway_net before first run.
# All secrets from process environment (set by secrets-bootstrap.ps1); no static .env files on disk.
# Keycloak OIDC: configure client in Keycloak with redirect URI http://zulip.${GATEWAY_DOMAIN:-localhost}/complete/keycloak/

services:
  zulip-postgres:
    image: zulip/zulip-postgresql:14
    container_name: devsecops-zulip-postgres
    hostname: zulip-postgres
    restart: unless-stopped
    secrets:
      - zulip__postgres_password
    environment:
      POSTGRES_DB: zulip
      POSTGRES_USER: zulip
      POSTGRES_PASSWORD_FILE: /run/secrets/zulip__postgres_password
    volumes:
      - zulip_postgres_data:/var/lib/postgresql/data
    networks:
      - chatops_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zulip -d zulip"]
      interval: 10s
      timeout: 5s
      retries: 5

  zulip-memcached:
    image: memcached:alpine
    container_name: devsecops-zulip-memcached
    hostname: zulip-memcached
    restart: unless-stopped
    command:
      - "sh"
      - "-euc"
      - |
        echo 'mech_list: plain' > "$$SASL_CONF_PATH"
        echo "zulip@$$HOSTNAME:$$(cat $$MEMCACHED_PASSWORD_FILE)" > "$$MEMCACHED_SASL_PWDB"
        echo "zulip@localhost:$$(cat $$MEMCACHED_PASSWORD_FILE)" >> "$$MEMCACHED_SASL_PWDB"
        exec memcached -S
    secrets:
      - zulip__memcached_password
    environment:
      SASL_CONF_PATH: "/home/memcache/memcached.conf"
      MEMCACHED_SASL_PWDB: "/home/memcache/memcached-sasl-db"
      MEMCACHED_PASSWORD_FILE: /run/secrets/zulip__memcached_password
    networks:
      - chatops_net

  zulip-redis:
    image: redis:alpine
    container_name: devsecops-zulip-redis
    hostname: zulip-redis
    restart: unless-stopped
    command:
      - "sh"
      - "-euc"
      - '/usr/local/bin/docker-entrypoint.sh --requirepass "$$(cat $$REDIS_PASSWORD_FILE)"'
    secrets:
      - zulip__redis_password
    environment:
      REDIS_PASSWORD_FILE: /run/secrets/zulip__redis_password
    volumes:
      - zulip_redis_data:/data
    networks:
      - chatops_net

  zulip-rabbitmq:
    image: rabbitmq:4.2
    container_name: devsecops-zulip-rabbitmq
    hostname: zulip-rabbitmq
    restart: unless-stopped
    # Official image reads RABBITMQ_DEFAULT_USER / RABBITMQ_DEFAULT_PASS from the environment.
    # Do not append to rabbitmq.conf with single-quoted echos — that writes literal "$(...)" text and breaks startup.
    command:
      - "sh"
      - "-euc"
      - |
        export RABBITMQ_DEFAULT_PASS="$$(cat $$RABBITMQ_PASSWORD_FILE)"
        exec docker-entrypoint.sh rabbitmq-server
    secrets:
      - zulip__rabbitmq_password
    environment:
      RABBITMQ_DEFAULT_USER: zulip
      RABBITMQ_PASSWORD_FILE: /run/secrets/zulip__rabbitmq_password
    volumes:
      - zulip_rabbitmq_data:/var/lib/rabbitmq
    networks:
      - chatops_net
    # RabbitMQ 4.x cold start can exceed 30s (see logs: "Time to start RabbitMQ"); 5s CMD timeout marks healthy nodes unhealthy.
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 30s
      retries: 5
      start_period: 90s

  zulip:
    image: ghcr.io/zulip/zulip-server:11.5-2
    container_name: devsecops-zulip
    hostname: zulip
    restart: unless-stopped
    secrets:
      - zulip__postgres_password
      - zulip__memcached_password
      - zulip__rabbitmq_password
      - zulip__redis_password
      - zulip__secret_key
      - zulip__email_password
      - zulip__social_auth_oidc_secret
    environment:
      # Hostnames for backend services (this compose uses prefixed names)
      SETTING_REMOTE_POSTGRES_HOST: zulip-postgres
      SETTING_MEMCACHED_LOCATION: zulip-memcached:11211
      SETTING_RABBITMQ_HOST: zulip-rabbitmq
      SETTING_REDIS_HOST: zulip-redis
      # Required settings
      SETTING_EXTERNAL_HOST: zulip.${GATEWAY_DOMAIN:-localhost}
      SETTING_ZULIP_ADMINISTRATOR: ${ZULIP_ADMINISTRATOR:-admin@breakglass.local}
      # Keycloak OIDC (redirect URI in Keycloak: http://zulip.${GATEWAY_DOMAIN:-localhost}/complete/keycloak/)
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost/keycloak}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-master}
      ZULIP_OIDC_CLIENT_ID: ${ZULIP_OIDC_CLIENT_ID:-zulip}
      # OIDC IdP: secret value comes from zulip__social_auth_oidc_secret; display_name and backend name
      SETTING_SOCIAL_AUTH_OIDC_ENABLED_IDPS: |
        keycloak:
          oidc_url: ${KEYCLOAK_PUBLIC_URL:-http://localhost/keycloak}/realms/${KEYCLOAK_REALM:-master}/protocol/openid-connect
          display_name: Keycloak
          client_id: ${ZULIP_OIDC_CLIENT_ID:-zulip}
          secret: social_auth_oidc_secret
          auto_signup: true
      ZULIP_AUTH_BACKENDS: EmailAuthBackend,keycloak
    volumes:
      - zulip_data:/data
    networks:
      - chatops_net
      - gateway_net
    depends_on:
      zulip-postgres:
        condition: service_healthy
      zulip-memcached:
        condition: service_started
      zulip-redis:
        condition: service_started
      zulip-rabbitmq:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.zulip-chatops.rule=Host(`zulip.${GATEWAY_DOMAIN:-localhost}`)"
      - "traefik.http.routers.zulip-chatops.entrypoints=web"
      - "traefik.http.services.zulip-chatops.loadbalancer.server.port=80"
      - "traefik.http.routers.zulip-chatops.priority=10"
    ulimits:
      nofile:
        soft: 1000000
        hard: 1048576

secrets:
  zulip__postgres_password:
    environment: "ZULIP_POSTGRES_PASSWORD"
  zulip__memcached_password:
    environment: "ZULIP_MEMCACHED_PASSWORD"
  zulip__rabbitmq_password:
    environment: "ZULIP_RABBITMQ_PASSWORD"
  zulip__redis_password:
    environment: "ZULIP_REDIS_PASSWORD"
  zulip__secret_key:
    environment: "ZULIP_SECRET_KEY"
  zulip__email_password:
    environment: "ZULIP_EMAIL_PASSWORD"
  zulip__social_auth_oidc_secret:
    environment: "ZULIP_OIDC_CLIENT_SECRET"

networks:
  chatops_net:
    external: true
  gateway_net:
    external: true

volumes:
  zulip_postgres_data:
  zulip_redis_data:
  zulip_rabbitmq_data:
  zulip_data:
