# Telemetry: sFlow-RT (ingest + UI), Prometheus, Grafana.
# Networks: telemetry_net (internal), sdn_lab_net (external) so VyOS/OVS can target sflow-rt:6343 via Docker DNS.
# Traefik: single-pane-of-glass attaches to telemetry_net; routes in traefik/dynamic/routes.yml.
# Grafana OIDC: set KEYCLOAK_PUBLIC_URL, KEYCLOAK_REALM, GRAFANA_OIDC_CLIENT_SECRET (process env / Vault).

services:
  sflow-rt:
    image: sflow/sflow-rt:latest
    container_name: devsecops-sflow-rt
    hostname: sflow-rt
    networks:
      - telemetry_net
      - sdn_lab_net
    ports:
      - "${SFLOW_RT_HTTP_PORT:-8008}:8008"
      - "${SFLOW_RT_UDP_PORT:-6343}:6343/udp"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: devsecops-prometheus
    hostname: prometheus
    networks:
      - telemetry_net
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./telemetry/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: devsecops-grafana
    hostname: grafana
    networks:
      - telemetry_net
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_SERVER_ROOT_URL: "${GRAFANA_ROOT_URL:-http://localhost/grafana}"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      # Set GRAFANA_OIDC_ENABLED=true and GRAFANA_OIDC_CLIENT_SECRET after creating Keycloak client "grafana"
      GF_AUTH_GENERIC_OAUTH_ENABLED: "${GRAFANA_OIDC_ENABLED:-false}"
      GF_AUTH_GENERIC_OAUTH_NAME: Keycloak
      GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: "true"
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: "${GRAFANA_OIDC_CLIENT_ID:-grafana}"
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: "${GRAFANA_OIDC_CLIENT_SECRET:-}"
      GF_AUTH_GENERIC_OAUTH_SCOPES: "openid email profile"
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: "${KEYCLOAK_PUBLIC_URL:-http://localhost/keycloak}/realms/${KEYCLOAK_REALM:-master}/protocol/openid-connect/auth"
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "${KEYCLOAK_PUBLIC_URL:-http://localhost/keycloak}/realms/${KEYCLOAK_REALM:-master}/protocol/openid-connect/token"
      GF_AUTH_GENERIC_OAUTH_API_URL: "${KEYCLOAK_PUBLIC_URL:-http://localhost/keycloak}/realms/${KEYCLOAK_REALM:-master}/protocol/openid-connect/userinfo"
      GF_AUTH_SIGNOUT_REDIRECT_URL: "${KEYCLOAK_PUBLIC_URL:-http://localhost/keycloak}/realms/${KEYCLOAK_REALM:-master}/protocol/openid-connect/logout"
      # Keycloak userinfo: align login/email claims (see Keycloak client mappers if claims differ)
      GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH: "${GRAFANA_OIDC_LOGIN_ATTRIBUTE_PATH:-preferred_username}"
      GF_AUTH_GENERIC_OAUTH_EMAIL_ATTRIBUTE_PATH: "${GRAFANA_OIDC_EMAIL_ATTRIBUTE_PATH:-email}"
      GF_AUTH_GENERIC_OAUTH_NAME_ATTRIBUTE_PATH: "${GRAFANA_OIDC_NAME_ATTRIBUTE_PATH:-name}"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./telemetry/grafana/provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped

networks:
  telemetry_net:
    external: true
  sdn_lab_net:
    external: true

volumes:
  prometheus_data:
  grafana_data:
