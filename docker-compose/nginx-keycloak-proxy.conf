# Reverse proxy for Keycloak: forward client host:port so redirects use the same URL (e.g. http://127.0.0.1:8180).
# $http_host = Host header from client (e.g. 127.0.0.1:8180 or localhost:8180); $scheme = http when user uses http.
server {
    listen 80;
    server_name _;
    location / {
        proxy_pass http://keycloak:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP 127.0.0.1;
        proxy_set_header X-Forwarded-For 127.0.0.1;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_buffering off;
    }
}
