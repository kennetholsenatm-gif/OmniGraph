# Reverse proxy for Keycloak: Keycloak runs under KC_HTTP_RELATIVE_PATH=/keycloak, so proxy /keycloak/ to keycloak:8080/keycloak/.
# Use http://127.0.0.1:8180/keycloak (KEYCLOAK_PUBLIC_URL) for admin and OIDC.
server {
    listen 80;
    server_name _;
    location /keycloak/ {
        proxy_pass http://keycloak:8080/keycloak/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP 127.0.0.1;
        proxy_set_header X-Forwarded-For 127.0.0.1;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_buffering off;
    }
    location / {
        return 302 /keycloak/;
    }
}
