# Tooling: Gitea, n8n, Zammad, Bitwarden (Vaultwarden), Docsify (Nginx + git sync) on isolated networks.
# Create networks first or use OpenTofu/Ansible. No lateral attachment.

services:
  gitea:
    image: gitea/gitea:1.21.4
    container_name: devsecops-gitea
    hostname: gitea
    networks:
      - gitea_net
    # For single ingress (production): comment out ports; access only via Traefik at /gitea/. Keep 2222:22 if Git over SSH is required.
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      # Canonical Gitea data location on host (repos, DB, config). Override with GITEA_DATA_PATH in .env.
      - "${GITEA_DATA_PATH:-C:/GiTeaRepos}:/data"
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      GITEA__security__INSTALL_LOCK: "true"
      # When behind Single Pane of Glass at http://localhost/gitea/
      GITEA__server__ROOT_URL: "${GITEA__server__ROOT_URL:-http://localhost/gitea/}"
      # Phase 2 IAM: Keycloak OIDC — use these when configuring Admin → Authentication → OAuth2 Source (OpenID Connect)
      KEYCLOAK_PUBLIC_URL: "${KEYCLOAK_PUBLIC_URL:-http://localhost/keycloak}"
      KEYCLOAK_REALM: "${KEYCLOAK_REALM:-master}"
      GITEA_OIDC_CLIENT_ID: "${GITEA_OIDC_CLIENT_ID:-gitea}"
      GITEA_OIDC_CLIENT_SECRET: "${GITEA_OIDC_CLIENT_SECRET:-}"
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: devsecops-n8n
    hostname: n8n
    networks:
      - n8n_net
      - msg_backbone_net
      # SDN / telemetry: reach VyOS, OVS-side services, sflow-rt via Docker DNS on sdn_lab_net
      - sdn_lab_net
    # For single ingress (production): comment out ports; access only via Traefik at /n8n/.
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      # When behind Single Pane of Glass at http://localhost/n8n/
      N8N_PATH: "${N8N_PATH:-/n8n}"
      N8N_EDITOR_BASE_URL: "${N8N_EDITOR_BASE_URL:-http://localhost/n8n}"
      WEBHOOK_URL: "${WEBHOOK_URL:-http://n8n:5678}"
      GITEA_API_TOKEN: "${GITEA_API_TOKEN}"
      SOLACE_PASSWORD: "${SOLACE_PASSWORD}"
      ZAMMAD_API_TOKEN: "${ZAMMAD_API_TOKEN}"
      N8N_LICENSE_ACTIVATION_KEY: "${N8N_LICENSE_ACTIVATION_KEY}"
      # Phase 2 IAM: Keycloak OIDC — use in Settings → SSO → OIDC (Discovery, Client ID, Secret)
      KEYCLOAK_PUBLIC_URL: "${KEYCLOAK_PUBLIC_URL:-http://localhost/keycloak}"
      KEYCLOAK_REALM: "${KEYCLOAK_REALM:-master}"
      N8N_OIDC_CLIENT_ID: "${N8N_OIDC_CLIENT_ID:-n8n}"
      N8N_OIDC_CLIENT_SECRET: "${N8N_OIDC_CLIENT_SECRET:-}"
    restart: unless-stopped

  zammad:
    image: zammad/zammad:latest
    container_name: devsecops-zammad
    hostname: zammad
    networks:
      - zammad_net
    # For single ingress (production): comment out ports; access only via Traefik at /zammad/.
    ports:
      - "8080:8080"
    environment:
      POSTGRES_HOST: zammad-postgres
      POSTGRES_USER: zammad
      POSTGRES_PASSWORD: ${ZAMMAD_POSTGRES_PASSWORD:?Set ZAMMAD_POSTGRES_PASSWORD}
      POSTGRES_DB: zammad_production
      REDIS_URL: redis://zammad-redis:6379
      ZAMMAD_WEBSOCKET_PORT: 6042
      # Phase 2 IAM: base URL for OIDC redirects; configure Admin → Settings → Security → OpenID Connect with Keycloak issuer and client zammad
      ZAMMAD_PUBLIC_URL: "${ZAMMAD_PUBLIC_URL:-http://localhost/zammad}"
    depends_on:
      zammad-postgres:
        condition: service_healthy
      zammad-redis:
        condition: service_started
    restart: unless-stopped

  zammad-postgres:
    image: postgres:15-alpine
    container_name: devsecops-zammad-db
    hostname: zammad-postgres
    networks:
      - zammad_net
    environment:
      POSTGRES_USER: zammad
      POSTGRES_PASSWORD: ${ZAMMAD_POSTGRES_PASSWORD:?Set ZAMMAD_POSTGRES_PASSWORD}
      POSTGRES_DB: zammad_production
    volumes:
      - zammad_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zammad -d zammad_production"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  zammad-redis:
    image: redis:7-alpine
    container_name: devsecops-zammad-redis
    hostname: zammad-redis
    networks:
      - zammad_net
    restart: unless-stopped

  bitwarden:
    image: vaultwarden/server:latest
    container_name: devsecops-bitwarden
    hostname: bitwarden
    networks:
      - bitwarden_net
    ports:
      - "${BITWARDEN_PORT:-8484}:80"
    volumes:
      - bitwarden_data:/data
    environment:
      DOMAIN: "${BITWARDEN_DOMAIN:-http://localhost/bitwarden}"
      ADMIN_TOKEN: "${BITWARDEN_ADMIN_TOKEN:-}"
      SIGNUPS_ALLOWED: "${BITWARDEN_SIGNUPS_ALLOWED:-true}"
      INVITATIONS_ALLOWED: "${BITWARDEN_INVITATIONS_ALLOWED:-true}"
      WEBSOCKET_ENABLED: "true"
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:latest
    container_name: devsecops-portainer
    hostname: portainer
    networks:
      - portainer_net
    ports:
      - "${PORTAINER_HTTP_PORT:-9000}:9000"
      - "${PORTAINER_HTTPS_PORT:-9443}:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    environment:
      # When behind Single Pane of Glass at http://localhost/portainer/
      PORTAINER_EDGE: "0"
    restart: unless-stopped

  # Docsify: one-shot git sync into shared volume; Nginx serves static site (Traefik /docs on docs_net).
  docs-sync:
    image: alpine/git:v2.47.1
    container_name: devsecops-docs-sync
    hostname: docs-sync
    networks:
      - gitea_net
    depends_on:
      gitea:
        condition: service_started
    environment:
      DOCS_GIT_REPO: "${DOCS_GIT_REPO:-http://gitea:3000/DevSecOps/architecture-docs.git}"
      DOCS_GIT_BRANCH: "${DOCS_GIT_BRANCH:-main}"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        REPO="$$DOCS_GIT_REPO"
        BRANCH="$$DOCS_GIT_BRANCH"
        if [ -z "$$REPO" ]; then echo "DOCS_GIT_REPO is empty"; exit 1; fi
        if [ -d /data/docs/.git ]; then
          git -C /data/docs fetch origin "$$BRANCH" && git -C /data/docs reset --hard "origin/$$BRANCH"
        else
          # Volume may hold stale non-repo files (no .git); git clone refuses non-empty targets
          rm -rf /data/docs/* 2>/dev/null || true
          rm -rf /data/docs/.[!.]* /data/docs/..?* 2>/dev/null || true
          git clone --depth 1 -b "$$BRANCH" "$$REPO" /data/docs
        fi
    volumes:
      - docs_data:/data/docs
    restart: "no"

  docs:
    image: nginx:1.27-alpine
    container_name: devsecops-docs
    hostname: docs
    networks:
      - docs_net
    depends_on:
      docs-sync:
        condition: service_completed_successfully
    volumes:
      - docs_data:/usr/share/nginx/html:ro
    restart: unless-stopped

  # SonarQube: JDBC to messaging Postgres (msg_backbone_net); UI via Traefik /sonarqube (sonarqube_net).
  # Start messaging (postgres + sonar-db-init) before tooling. Keycloak OIDC: see docs/SONARQUBE_KEYCLOAK.md
  sonarqube:
    image: sonarqube:10.6.0-community
    container_name: devsecops-sonarqube
    hostname: sonarqube
    networks:
      - sonarqube_net
      - msg_backbone_net
    environment:
      SONAR_JDBC_URL: "jdbc:postgresql://postgres:5432/${SONAR_JDBC_DB:-sonar}"
      SONAR_JDBC_USERNAME: ${SONAR_JDBC_USERNAME:-sonar}
      SONAR_JDBC_PASSWORD: ${SONAR_JDBC_PASSWORD:-}
      SONAR_WEB_CONTEXT: ${SONAR_WEB_CONTEXT:-/sonarqube}
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
      SONAR_WEB_JAVAOPTS: "${SONAR_WEB_JAVAOPTS:--Xmx2g -Xms512m}"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    restart: unless-stopped

networks:
  gitea_net:
    external: true
  n8n_net:
    external: true
  zammad_net:
    external: true
  bitwarden_net:
    external: true
  portainer_net:
    external: true
  msg_backbone_net:
    external: true
  sdn_lab_net:
    external: true
  docs_net:
    external: true
  sonarqube_net:
    external: true

volumes:
  n8n_data:
  zammad_postgres_data:
  bitwarden_data:
  portainer_data:
  docs_data:
    name: devsecops_docs_volume
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
