services:
  gitea-db:
    image: postgres:16-alpine
    container_name: devsecops-gitea-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${GITEA_DB_NAME:-gitea}
      POSTGRES_USER: ${GITEA_DB_USER:-gitea}
      POSTGRES_PASSWORD: ${GITEA_DB_PASSWORD:-gitea_local_dev}
    volumes:
      - gitea_db_data:/var/lib/postgresql/data
    networks:
      - gitea_net

  gitea:
    image: gitea/gitea:1.22.3
    container_name: devsecops-gitea
    restart: unless-stopped
    depends_on:
      - gitea-db
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: gitea-db:5432
      GITEA__database__NAME: ${GITEA_DB_NAME:-gitea}
      GITEA__database__USER: ${GITEA_DB_USER:-gitea}
      GITEA__database__PASSWD: ${GITEA_DB_PASSWORD:-gitea_local_dev}
      GITEA__server__ROOT_URL: ${GITEA_URL:-http://127.0.0.1:3000}
      # Do not set INSTALL_LOCK here: let /data/gitea/conf/app.ini own it after the install wizard,
      # or you risk an install loop / empty responses when env overrides a completed install.
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - gitea_data:/data
    networks:
      - gitea_net

networks:
  gitea_net:
    external: true

volumes:
  gitea_data:
  gitea_db_data:
