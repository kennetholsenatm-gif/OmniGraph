# Full-stack discovery on discovery_net (100.64.40.0/24). External network only.
# See docs/ADR_FULLSTACK_DISCOVERY.md and ansible/playbooks/deploy-fullstack-discovery.yml
#
# Prerequisites: docker network create --driver bridge --subnet 100.64.40.0/24 discovery_net
# Or: scripts/create-networks.ps1 / OpenTofu / deploy-devsecops-mesh.yml
#
# Env: set NETBOX_*, DEP_TRACK_* (and optional NETDISCO_*) via Vault / Varlock — see devsecops.env.schema

services:
  netbox-postgres:
    image: postgres:15-alpine
    container_name: devsecops-netbox-postgres
    hostname: netbox-postgres
    networks:
      - discovery_net
    environment:
      POSTGRES_USER: netbox
      POSTGRES_PASSWORD: ${NETBOX_DB_PASSWORD:?set NETBOX_DB_PASSWORD}
      POSTGRES_DB: netbox
    volumes:
      - netbox_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netbox -d netbox"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  netbox-redis:
    image: redis:7-alpine
    container_name: devsecops-netbox-redis
    hostname: netbox-redis
    networks:
      - discovery_net
    environment:
      REDIS_PASSWORD: ${NETBOX_REDIS_PASSWORD:?set NETBOX_REDIS_PASSWORD}
    command: >
      sh -c "redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""
    volumes:
      - netbox_redis_data:/data
    restart: unless-stopped

  netbox:
    image: netboxcommunity/netbox:v4.2.2
    container_name: devsecops-netbox
    hostname: netbox
    networks:
      - discovery_net
    depends_on:
      netbox-postgres:
        condition: service_healthy
      netbox-redis:
        condition: service_started
    environment:
      SECRET_KEY: ${NETBOX_SECRET_KEY:?set NETBOX_SECRET_KEY}
      DB_HOST: netbox-postgres
      DB_NAME: netbox
      DB_USER: netbox
      DB_PASSWORD: ${NETBOX_DB_PASSWORD:?}
      REDIS_HOST: netbox-redis
      REDIS_PASSWORD: ${NETBOX_REDIS_PASSWORD:?}
      REDIS_DATABASE: "0"
      REDIS_INSECURE_SKIP_TLS_VERIFY: "true"
      ALLOWED_HOSTS: "*"
      SUPERUSER_NAME: ${NETBOX_SUPERUSER_NAME:-admin}
      SUPERUSER_EMAIL: ${NETBOX_SUPERUSER_EMAIL:-admin@example.com}
      SUPERUSER_PASSWORD: ${NETBOX_SUPERUSER_PASSWORD:?set NETBOX_SUPERUSER_PASSWORD}
      SKIP_SUPERUSER: "false"
    ports:
      - "8000:8080"
    restart: unless-stopped

  netbox-worker:
    image: netboxcommunity/netbox:v4.2.2
    container_name: devsecops-netbox-worker
    hostname: netbox-worker
    networks:
      - discovery_net
    entrypoint: /opt/netbox/docker-entrypoint.sh
    command: ["/opt/netbox/venv/bin/python", "/opt/netbox/netbox/manage.py", "rqworker", "high", "low", "default"]
    depends_on:
      - netbox
    environment:
      SECRET_KEY: ${NETBOX_SECRET_KEY:?}
      DB_HOST: netbox-postgres
      DB_NAME: netbox
      DB_USER: netbox
      DB_PASSWORD: ${NETBOX_DB_PASSWORD:?}
      REDIS_HOST: netbox-redis
      REDIS_PASSWORD: ${NETBOX_REDIS_PASSWORD:?}
      REDIS_DATABASE: "0"
      REDIS_INSECURE_SKIP_TLS_VERIFY: "true"
    restart: unless-stopped

  # Bundled API + UI + embedded store for dev; pin version for production and prefer split API/DB.
  dependency-track:
    image: dependencytrack/bundled:4.11.7
    container_name: devsecops-dependency-track
    hostname: dependency-track
    networks:
      - discovery_net
    environment:
      ALPINE_OIDC_ENABLED: "false"
    volumes:
      - dependency_track_data:/data
    ports:
      - "8081:8080"
    restart: unless-stopped

  # Optional: SNMP/L2 discovery — enable with: docker compose --profile netdisco -f docker-compose.discovery.yml up -d
  # NetDISCO is optional and highly site-specific (DB, SNMP ro strings). Enable with --profile netdisco
  # and replace environment/volumes per https://hub.docker.com/r/netdisco/netdisco or your distro packages.
  netdisco:
    profiles: ["netdisco"]
    image: netdisco/netdisco:latest
    container_name: devsecops-netdisco
    hostname: netdisco
    networks:
      - discovery_net
    restart: unless-stopped

networks:
  discovery_net:
    external: true

volumes:
  netbox_pg_data:
  netbox_redis_data:
  dependency_track_data:
