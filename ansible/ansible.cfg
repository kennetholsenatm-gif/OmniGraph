[defaults]
# Paths are anchored to this file's directory (ansible/), not the shell CWD.
inventory = %(here)s/inventory.yml
roles_path = %(here)s/roles
# Lab: paramiko/network_cli prompts on first SSH to IOS; pre-seed known_hosts or set False. Production: True + known_hosts.
host_key_checking = False
# community.general.yaml callback was removed (c.g. 12+); use builtin default + YAML task results (ansible-core 2.13+).
stdout_callback = default
callback_result_format = yaml

# network_cli + paramiko: auto-accept unknown device host keys (lab). Complements host_key_checking.
[paramiko_connection]
host_key_auto_add = True

[privilege_escalation]
# Prompt once at play start when any task uses become (hypervisor role needs sudo).
# Still set when ANSIBLE_CONFIG points here (e.g. run-deploy-devsecops-lxc.sh). From world-writable CWD without ANSIBLE_CONFIG, use: ansible-playbook -K
become_ask_pass = True
