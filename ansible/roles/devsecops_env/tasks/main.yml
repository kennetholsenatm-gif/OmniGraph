---
# Shared non-secret defaults live in ansible/roles/devsecops_containers/defaults/main.yml (devsecops_env_defaults).
- name: Load devsecops_containers default vars (non-secrets)
  ansible.builtin.include_vars:
    file: "{{ role_path | dirname }}/devsecops_containers/defaults/main.yml"

- name: Fail when devsecops_secrets not provided
  ansible.builtin.fail:
    msg: "Provide devsecops_secrets (e.g. group_vars with ansible-vault, or -e @secrets.yml). See devsecops_containers README."
  when: devsecops_secrets is not defined or devsecops_secrets | length == 0

- name: Build combined env (defaults + secrets)
  ansible.builtin.set_fact:
    devsecops_combined_env: "{{ devsecops_env_defaults | combine(devsecops_secrets, recursive=false) }}"
    container_env: "{{ devsecops_env_defaults | combine(devsecops_secrets, recursive=false) }}"
  no_log: true
