---
# -- Identity / DNS (hostname scheme: short name + ip domain-name; FQDN = hostname.domain) --
# Example: isr01 + corp.lab -> isr01.corp.lab (configure DNS / inventory consistently).
cisco_isr_hostname: ""
# When empty, Ansible falls back to inventory_hostname (sanitized for IOS hostname rules).
cisco_isr_domain_name: "corp.lab"

# -- IaC automation user (Ansible SSH + IOS local user; not a human operator account) --
cisco_isr_admin_username: iac
# Override in group_vars/network_isr.yml (no HashiCorp Vault required). Do not commit real passwords.
# Optional later: Ansible Vault encrypt group_vars, or HashiCorp Vault + lookup — see docs.
cisco_isr_admin_password: "CHANGE_ME_IMMEDIATELY"
cisco_isr_admin_privilege: 15
# Single-line OpenSSH public key (ssh-ed25519 AAAAC3... or ssh-rsa AAAAB3...).
# Copy files/ssh/iac.pub.example -> iac.pub under role files/ssh/ and set:
# cisco_isr_admin_ssh_pubkey_file: "ssh/iac.pub"
cisco_isr_admin_ssh_pubkey: ""
# If set (relative to role files/ path), loaded when cisco_isr_admin_ssh_pubkey is empty.
cisco_isr_admin_ssh_pubkey_file: ""

# -- Human admin (interactive SSH; key-only on-box — not ansible_user) --
# Ansible should connect as cisco_isr_admin_username (iac). This account is a separate local user with
# nopassword + ssh pubkey (see tasks/human_admin_user.yml).
cisco_isr_human_admin_enabled: true
cisco_isr_human_admin_username: kbolsen
cisco_isr_human_admin_privilege: 15
cisco_isr_human_admin_ssh_pubkey: ""
# Default: tracked files/ssh/kbolsen.pub (same key as .dev/kbolsen_admin.pub).
cisco_isr_human_admin_ssh_pubkey_file: "ssh/kbolsen.pub"

# -- RSA host key for SSH (first boot / lab); idempotent best-effort --
cisco_isr_generate_ssh_rsa_key: true
cisco_isr_ssh_rsa_modulus: 2048

# -- Physical interfaces (L3 unless switchport block used on your chassis SKU) --
# WAN: see VLAN_MATRIX — typically DHCP toward cable modem path.
cisco_isr_wan_interface: GigabitEthernet0/0/0
cisco_isr_wan_description: "WAN_CPE_DHCP"
cisco_isr_wan_ipv4_dhcp: true
cisco_isr_wan_ipv4_address: ""
cisco_isr_wan_ipv4_mask: ""

# Inside toward Catalyst trunk (routed subinterfaces on ISR; native VLAN 1 is NOT used on switch trunk).
cisco_isr_inside_interface: GigabitEthernet0/0/1
cisco_isr_inside_description: "TRUNK_TO_CORE__DOT1Q_SUBIFS"

# Optional: configure this port as an L2 trunk on platforms that support it (mutually exclusive with
# L3 subinterfaces on the *same* port — pick one design). Default is L3 + dot1q subinterfaces.
cisco_isr_inside_switchport_trunk: false
cisco_isr_inside_native_vlan_id: 3999
# When cisco_isr_inside_switchport_trunk: true — align with VLAN_MATRIX / C3560CX uplink (include 2250 ceph).
# L3 dot1q design: define VLANs via cisco_isr_inside_subinterfaces instead; switch still needs same trunk allow.
cisco_isr_inside_trunk_allowed_vlans: "240,244,86,2001,2005,2250"

# Loopback (optional)
cisco_isr_loopback_interface: Loopback0
cisco_isr_loopback_config:
  enabled: false
  # ipv4: 100.64.242.11
  # mask: 255.255.255.255
  # description: "ISR_MGMT_LOOPBACK"

# List of { vlan, ipv4, mask, description, vrrp?: { group, vip, priority, preempt } }
cisco_isr_inside_subinterfaces: []

# -- UCS-E service modules (ISR4k SM, e.g. UCS-E140S in SM subslot 1/0 and 2/0) --
# • IMC = Integrated Management Controller (out-of-band style web UI to the blade); configured under
#   `ucse subslot <slot>/<subslot>` with `imc ip address … default-gateway …`.
# • `interface ucse<s>/<ss>/0` is the router internal link for traffic that should hairpin through IOS-XE.
# Align addressing with VLAN_MATRIX 100.64.245.0/24 (UCS-A) and 100.64.246.0/24 (UCS-B).
# Do not put the same /24 on both ucse and a Gi subinterface unless you design redundancy/VRRP explicitly.
cisco_isr_ucse_enabled: false
# Default IMC LOM mapping — adjust per Cisco UCS-E guide (`shared-lom ge2`, `shared-lom ge3`, `shared-lom console`, …).
cisco_isr_ucse_imc_access_port_default: "shared-lom ge2"
# List of module definitions (see README). Inventory ISR4351: PID UCS-E140S-M2/K9 typically SM 1/0 and 2/0.
cisco_isr_ucse_modules: []
# Example (copy into group_vars and set cisco_isr_ucse_enabled: true):
# cisco_isr_ucse_modules:
#   - subslot: "1/0"
#     description: "UCS-E_A_OpenNebula_UCS-E140S"
#     configure_router_interface: true
#     router_interface:
#       mode: l3
#       ipv4: 100.64.245.1
#       mask: 255.255.255.0
#     imc:
#       ipv4: 100.64.245.10
#       mask: 255.255.255.0
#       default_gateway: 100.64.245.1
#     imc_access_port: "shared-lom ge2"
#   - subslot: "2/0"
#     description: "UCS-E_B_OpenNebula_UCS-E140S"
#     router_interface:
#       mode: l3
#       ipv4: 100.64.246.1
#       mask: 255.255.255.0
#     imc:
#       ipv4: 100.64.246.10
#       mask: 255.255.255.0
#       default_gateway: 100.64.246.1
#
# Bring `interface ucse<s>/<ss>/0` out of shutdown even before full L3/IMC is modeled:
cisco_isr_ucse_ensure_no_shutdown: true
# Extra SM subslots (e.g. ["1/0","2/0"]) merged with subslots from cisco_isr_ucse_modules for no shutdown.
cisco_isr_ucse_extra_subslots: []

# -- Data-plane security (WAN ingress extended ACL) --
# ⚠️ Enable only after you confirm lines match your WAN (DHCP vs static) and transit needs.
# Applied inbound on cisco_isr_wan_interface. If group_vars sets only `enabled: true`, lines fall back to the template.
cisco_isr_wan_infrastructure_acl_lines_template:
  - remark Antispoof inbound (RFC1918 sources should not arrive from ISP toward this edge)
  - deny ip 10.0.0.0 0.255.255.255 any log
  - deny ip 172.16.0.0 0.15.255.255 any log
  - deny ip 192.168.0.0 0.0.255.255 any log
  - remark DHCP client on WAN
  - permit udp any eq bootpc any eq bootps
  - permit udp any eq bootps any eq bootpc
  - remark Lab catch-all (tighten in production)
  - permit ip any any
cisco_isr_wan_infrastructure_acl:
  enabled: false
  name: ISR-WAN-INFILT
  lines: []

# -- Control-plane security (CoPP-style service-policy on control-plane host) --
# Rate-limits aggregate traffic punted to the RP. Disable if your IOS train rejects the policy-map syntax.
cisco_isr_copp_enabled: false
cisco_isr_copp_policy_map: CP-HOST-COPP
# Percent of reference bandwidth for default class (raise if you see SSH/console flaps under load).
cisco_isr_copp_police_rate_percent: 10

# -- Banner / legal --
cisco_isr_banner_login: |
  ***********************************************************************
  * UNAUTHORIZED ACCESS PROHIBITED — monitored / law enforcement notified *
  * This system is for authorized use only. Disconnect if not expressly  *
  * permitted by the owner. All activity is logged.                       *
  ***********************************************************************

# -- Console / VTY --
cisco_isr_line_con_exec_timeout_minutes: 10
cisco_isr_line_vty_exec_timeout_minutes: 10
cisco_isr_line_vty_max: 15
cisco_isr_v_transport_input: "ssh"
cisco_isr_vty_access_class: ""

# -- Logging (sync keeps prompts from interrupting typed input) --
cisco_isr_logging_buffered_size: 524288
cisco_isr_logging_console: true
cisco_isr_logging_sync_level: "informational"
# Optional remote syslog destinations for SIEM/collector.
# Example:
# cisco_isr_logging_hosts:
#   - "100.64.54.20 transport udp port 514"
#   - "100.64.54.20 transport tcp port 514"
cisco_isr_logging_hosts: []
# Optional source interface used when emitting syslog packets.
cisco_isr_logging_source_interface: ""
# Optional trap level for remote logging.
cisco_isr_logging_trap_level: ""

# -- NAT / static routes (existing behavior) --
cisco_isr_configure_nat_overload: false
cisco_isr_nat_acl_name: NAT_INSIDE
cisco_isr_wan_acl_for_nat: NAT_OUTSIDE_INTERFACE
cisco_isr_static_routes: []

cisco_isr_service_password_encryption: true

# Set false only if an app on-box (e.g. legacy HTTP admin) requires the embedded HTTP server.
cisco_isr_disable_http_servers: true

# -- Multicast: IGMPv3 on interfaces; enable multicast routing if using ASM/SSM beyond link-local --
cisco_isr_multicast_routing: false
cisco_isr_ip_multicast_routing_cmd: "ip multicast-routing distributed"
# Interfaces (short names) to run IGMPv3 / optional sparse PIM toward RP (lab toggle).
cisco_isr_igmp_interfaces: []
# - { interface: "GigabitEthernet0/0/1.244", pim_sparse: false }

# -- IGP: OSPFv2 interoperates cleanly with VyOS/FRR (Zebra) and Cisco IOS-XE.
# Google / Nest Wi‑Fi does not expose OSPF — use statics or a routed /30 toward the Google WAN side (see VLAN_MATRIX 243).
cisco_isr_ospf:
  enabled: false
  process_id: 1
  # Lines are merged under `router ospf <process_id>` (IOS syntax).
  lines: []
  # Example:
  # lines:
  #   - router-id 100.64.242.11
  #   - passive-interface default
  #   - no passive-interface GigabitEthernet0/0/1.240
  #   - network 100.64.240.0 0.0.0.255 area 0
  #   - network 100.64.244.0 0.0.0.255 area 0

# -- BGP (WAN/DC edge or future L3VPN/EVPN — not DMVPN; not “BGP for VXLAN” unless you deploy EVPN.) --
cisco_isr_bgp:
  enabled: false
  as: 65001
  lines: []
  # Example:
  # lines:
  #   - bgp router-id 100.64.242.11
  #   - neighbor 198.51.100.1 remote-as 65100
  #   - address-family ipv4
  #   -  neighbor 198.51.100.1 activate
