---
- name: Baseline IOS service settings (idempotent)
  cisco.ios.ios_config:
    lines:
      - service timestamps debug datetime msec
      - service timestamps log datetime msec
    save_when: never

- name: Disable embedded HTTP(S) servers (hardening)
  cisco.ios.ios_config:
    lines:
      - no ip http server
      - no ip http secure-server
    save_when: never
  when: cisco_isr_disable_http_servers | default(true) | bool

- name: Set hostname
  cisco.ios.ios_config:
    lines:
      - "hostname {{ _cisco_isr_hostname_effective }}"
    save_when: never

- name: Set ip domain name (FQDN suffix for SSH key / certs)
  cisco.ios.ios_config:
    lines:
      - "ip domain name {{ cisco_isr_domain_name | default('corp.lab') }}"
    save_when: never

- name: Enable password encryption (optional)
  cisco.ios.ios_config:
    lines:
      - service password-encryption
  when: cisco_isr_service_password_encryption | bool
