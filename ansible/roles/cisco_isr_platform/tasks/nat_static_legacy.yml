---
- name: Install static routes (IPv4)
  cisco.ios.ios_config:
    lines:
      - "ip route {{ item.prefix }} {{ item.mask }} {{ item.next_hop }}"
  loop: "{{ cisco_isr_static_routes }}"
  when: cisco_isr_static_routes | length > 0

- name: NAT overload toward WAN (enable only after ACLs exist on device)
  when: cisco_isr_configure_nat_overload | bool
  block:
    - name: ip nat outside on WAN
      cisco.ios.ios_config:
        parents:
          - "interface {{ cisco_isr_wan_interface }}"
        lines:
          - ip nat outside

    - name: ip nat inside on inside subinterfaces
      cisco.ios.ios_config:
        parents:
          - "interface {{ cisco_isr_inside_interface }}.{{ item.vlan }}"
        lines:
          - ip nat inside
      loop: "{{ cisco_isr_inside_subinterfaces }}"
      when: not (cisco_isr_inside_switchport_trunk | bool)
      loop_control:
        label: "{{ cisco_isr_inside_interface }}.{{ item.vlan }}"

    - name: PAT overload statement (requires ACL {{ cisco_isr_nat_acl_name }} on device)
      cisco.ios.ios_config:
        lines:
          - "ip nat inside source list {{ cisco_isr_nat_acl_name }} interface {{ cisco_isr_wan_interface }} overload"
