---
- name: Console — sync logging + exec timeout
  cisco.ios.ios_config:
    parents:
      - line console 0
    lines:
      - "exec-timeout {{ cisco_isr_line_con_exec_timeout_minutes }} 0"
      - logging synchronous
    save_when: never

- name: VTY — SSH, local login, sync, timeouts (no ACL)
  cisco.ios.ios_config:
    parents:
      - "line vty 0 {{ cisco_isr_line_vty_max }}"
    lines:
      - "transport input {{ cisco_isr_v_transport_input }}"
      - login local
      - "exec-timeout {{ cisco_isr_line_vty_exec_timeout_minutes }} 0"
      - logging synchronous
    save_when: never
  when: (cisco_isr_vty_access_class | default('') | trim | length) == 0

- name: VTY — SSH, local login, sync, timeouts + access-class
  cisco.ios.ios_config:
    parents:
      - "line vty 0 {{ cisco_isr_line_vty_max }}"
    lines:
      - "transport input {{ cisco_isr_v_transport_input }}"
      - login local
      - "exec-timeout {{ cisco_isr_line_vty_exec_timeout_minutes }} 0"
      - logging synchronous
      - "access-class {{ cisco_isr_vty_access_class }} in"
    save_when: never
  when: (cisco_isr_vty_access_class | default('') | trim | length) > 0
