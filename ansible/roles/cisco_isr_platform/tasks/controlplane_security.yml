---
# Control-plane policing (CoPP-style): rate-limit aggregate traffic switched to the route processor.
# Syntax is IOS-XE typical; disable cisco_isr_copp_enabled if your train rejects it.
- name: Control-plane — policy-map type control-plane (default class police)
  cisco.ios.ios_config:
    parents:
      - "policy-map type control-plane {{ cisco_isr_copp_policy_map }}"
      - class class-default
    lines:
      - "police rate percent {{ cisco_isr_copp_police_rate_percent }}"
    save_when: never
  when: cisco_isr_copp_enabled | default(false) | bool

- name: Control-plane — attach service-policy to control-plane host
  cisco.ios.ios_config:
    parents:
      - control-plane host
    lines:
      - "service-policy input {{ cisco_isr_copp_policy_map }}"
    save_when: never
  when: cisco_isr_copp_enabled | default(false) | bool
