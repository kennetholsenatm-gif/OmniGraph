---
# Prefer SSH key + vaulted password; password auth remains available for break-glass.
- name: Local admin user — password plus SSH public key when key is present
  cisco.ios.ios_user:
    name: "{{ cisco_isr_admin_username }}"
    privilege: "{{ cisco_isr_admin_privilege }}"
    configured_password: "{{ cisco_isr_admin_password }}"
    sshkey: "{{ _cisco_isr_ssh_pubkey_effective }}"
    update_password: always
  when: (_cisco_isr_ssh_pubkey_effective | default('') | length) > 0
  no_log: true

- name: Local admin user — password only (no pubkey configured)
  cisco.ios.ios_user:
    name: "{{ cisco_isr_admin_username }}"
    privilege: "{{ cisco_isr_admin_privilege }}"
    configured_password: "{{ cisco_isr_admin_password }}"
    update_password: always
  when: (_cisco_isr_ssh_pubkey_effective | default('') | length) == 0
  no_log: true
