---
# Requires `ip multicast-routing` for typical IOS-XE multicast behaviors beyond dumb L2 flooding.
- name: Global multicast routing
  cisco.ios.ios_config:
    lines:
      - "{{ cisco_isr_ip_multicast_routing_cmd }}"
    save_when: never
  when: cisco_isr_multicast_routing | bool

- name: IGMPv3 on interfaces
  cisco.ios.ios_config:
    parents:
      - "interface {{ item.interface }}"
    lines:
      - ip igmp version 3
    save_when: never
  loop: "{{ cisco_isr_igmp_interfaces }}"
  when:
    - cisco_isr_multicast_routing | bool
    - cisco_isr_igmp_interfaces | length > 0
  loop_control:
    label: "{{ item.interface }}"

- name: PIM sparse-mode (lab — design an RP or use BSR first)
  cisco.ios.ios_config:
    parents:
      - "interface {{ item.interface }}"
    lines:
      - ip pim sparse-mode
    save_when: never
  loop: "{{ cisco_isr_igmp_interfaces | selectattr('pim_sparse', 'defined') | selectattr('pim_sparse') | list }}"
  when:
    - cisco_isr_multicast_routing | bool
    - cisco_isr_igmp_interfaces | length > 0
  loop_control:
    label: "PIM {{ item.interface }}"
