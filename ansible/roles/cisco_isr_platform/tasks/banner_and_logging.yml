---
- name: MOTD / login banner (authorized use)
  cisco.ios.ios_banner:
    banner: login
    text: "{{ cisco_isr_banner_login }}\n"
    state: present

- name: Logging buffered + console severity
  cisco.ios.ios_config:
    lines:
      - "logging buffered {{ cisco_isr_logging_buffered_size }}"
      - "logging console {{ cisco_isr_logging_sync_level }}"
    save_when: never
  when: cisco_isr_logging_console | bool

- name: Logging buffered only (when console logging disabled)
  cisco.ios.ios_config:
    lines:
      - "logging buffered {{ cisco_isr_logging_buffered_size }}"
    save_when: never
  when: not (cisco_isr_logging_console | bool)

- name: Configure remote syslog hosts (optional)
  cisco.ios.ios_config:
    lines: "{{ cisco_isr_logging_hosts | map('regex_replace', '^(.*)$', 'logging host \\1') | list }}"
    save_when: never
  when: cisco_isr_logging_hosts | length > 0

- name: Configure logging source-interface (optional)
  cisco.ios.ios_config:
    lines:
      - "logging source-interface {{ cisco_isr_logging_source_interface }}"
    save_when: never
  when: cisco_isr_logging_source_interface | default('') | trim | length > 0

- name: Configure remote logging trap level (optional)
  cisco.ios.ios_config:
    lines:
      - "logging trap {{ cisco_isr_logging_trap_level }}"
    save_when: never
  when: cisco_isr_logging_trap_level | default('') | trim | length > 0
