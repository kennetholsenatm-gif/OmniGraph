# Non-secret defaults only. Secrets come from Vault (hashicorp_vault lookup) or vault-encrypted devsecops_secrets.
# See role README and VARLOCK_USAGE.md. No raw secrets in this file.

# Paths relative to playbook_dir (ansible/playbooks -> ../../ = repo root)
devsecops_compose_base: "{{ playbook_dir }}/../../docker-compose"
devsecops_gateway_base: "{{ playbook_dir }}/../../single-pane-of-glass"
# Canonical compose sets: docker-compose/stack-manifest.json (verify with scripts/verify-stack-manifest.ps1).
# Ansible uses separate project_name per stack (unlike merged `docker compose` in PowerShell); service names must stay unique.
vault_secret_path: "secret/data/devsecops"
use_hashicorp_vault: true  # Set false to use devsecops_secrets from vars only (e.g. ansible-vault encrypted)

# Non-secret defaults (compose variable interpolation)
devsecops_env_defaults:
  GITEA_DATA_PATH: "/opt/gitea/repos"
  GITEA_URL: "http://gitea:3000"
  KEYCLOAK_URL: "http://keycloak:8080"
  KEYCLOAK_REALM: "master"
  GATEWAY_DOMAIN: "localhost"
  GATEWAY_BASE_URL: "http://localhost"
  KEYCLOAK_PUBLIC_URL: "http://localhost/keycloak"
  N8N_EDITOR_BASE_URL: "http://localhost/n8n"
  ZAMMAD_PUBLIC_URL: "http://localhost/zammad"
  GITEA_OIDC_CLIENT_ID: "gitea"
  N8N_OIDC_CLIENT_ID: "n8n"
  KEYCLOAK_AUTOMATION_CLIENT_ID: "devsecops-automation"
  GATEWAY_HTTP_PORT: "80"
  GATEWAY_HTTPS_PORT: "443"
  GITEA_WIKI_OWNER: ""
  GITEA_WIKI_REPO: ""
  LMNOTEBOOK_URL: ""
  BITWARDEN_DOMAIN: "http://localhost:8484"
  BITWARDEN_PORT: "8484"
  BITWARDEN_SIGNUPS_ALLOWED: "true"
  BITWARDEN_INVITATIONS_ALLOWED: "true"
  N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
  WEBHOOK_URL: "http://n8n:5678"
  SOLACE_BROKER_WS_URL: "ws://solace-pubsub:8008"
  VAULT_ADDR: "http://vault:8200"
  # Teleport (IAM stack); secrets (TELEPORT_API_TOKEN) from Vault only
  TELEPORT_PROXY: "teleport"
  TELEPORT_AUTH_SERVER: "teleport:3025"
  TELEPORT_PUBLIC_WEB_URL: "http://127.0.0.1:3080"
  NETBOX_URL: "http://netbox:8080"
  DEP_TRACK_URL: "http://dependency-track:8080"
  # Telemetry / Grafana (non-secret); secrets from devsecops_secrets
  GRAFANA_ROOT_URL: "http://localhost/grafana"
  GRAFANA_OIDC_ENABLED: "false"
  GRAFANA_OIDC_CLIENT_ID: "grafana"
  SFLOW_RT_HTTP_PORT: "8008"
  SFLOW_RT_UDP_PORT: "6343"
  # Docsify (docker-compose.tooling.yml docs-sync + docs)
  DOCS_GIT_REPO: "http://gitea:3000/DevSecOps/architecture-docs.git"
  DOCS_GIT_BRANCH: "main"
  DOCS_SYNC_ENABLED: "false"
  DOCS_SYNC_CONTAINER_NAME: "devsecops-docs-sync"
  DOCS_SYNC_REPO_FULL_NAME: ""
  SONAR_JDBC_DB: "sonar"
  SONAR_JDBC_USERNAME: "sonar"
  SONAR_WEB_CONTEXT: "/sonarqube"
  SONAR_WEB_JAVAOPTS: "-Xmx2g -Xms512m"

# Stack toggles (core: messaging, IAM, tooling, ChatOps)
start_chatops: true
start_discovery: false
start_llm: false
start_ai_orchestration: false
start_siem: false
