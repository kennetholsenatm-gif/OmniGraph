---
# Mini PC bare-metal host (Alma + Incus) for VyOS / PacketFence edge — see deployments/mini-pc-firewall/

# copr | none | package
mini_pc_incus_install_method: copr

# Verify on https://copr.fedoraproject.org/ for your EL major (10) before enabling.
mini_pc_incus_copr: neelc/incus

# If install_method=package, install this RPM name from enabled repos.
mini_pc_incus_package_name: incus

# Enable systemd units for Incus and the guest agent.
mini_pc_enable_incus_service: true
mini_pc_enable_qemu_guest_agent: true
