---
- name: Install base packages for Incus host
  ansible.builtin.dnf:
    name:
      - dnf-plugins-core
      - epel-release
      - qemu-guest-agent
      - firewalld
      - curl
      - git
      - jq
      - openssl
      - bridge-utils
      - iproute
      - nftables
      - kmod
    state: present

- name: Persist kernel modules for bridges / containers
  ansible.builtin.copy:
    dest: /etc/modules-load.d/mini-pc-incus.conf
    mode: "0644"
    content: |
      bridge
      br_netfilter
      nf_nat
      nf_conntrack
      overlay

- name: Persist sysctl for IPv4/IPv6 forwarding
  ansible.builtin.copy:
    dest: /etc/sysctl.d/90-mini-pc-router.conf
    mode: "0644"
    content: |
      net.ipv4.ip_forward = 1
      net.ipv6.conf.all.forwarding = 1

- name: Apply sysctl
  ansible.builtin.command: sysctl --system
  changed_when: true

- name: Enable COPR for Incus (optional)
  ansible.builtin.command: dnf copr enable -y "{{ mini_pc_incus_copr }}"
  register: _mini_pc_copr
  changed_when: _mini_pc_copr.rc == 0
  failed_when: false
  when: mini_pc_incus_install_method == "copr"

- name: Warn when COPR enable failed (install Incus manually)
  ansible.builtin.debug:
    msg: >-
      dnf copr enable {{ mini_pc_incus_copr }} failed (rc={{ _mini_pc_copr.rc | default('?') }}).
      Verify the project on Fedora Copr for EL{{ ansible_distribution_major_version }}, or set mini_pc_incus_install_method=none.
  when:
    - mini_pc_incus_install_method == "copr"
    - _mini_pc_copr.rc | default(1) != 0

- name: Install Incus from COPR-enabled repos
  ansible.builtin.dnf:
    name: "{{ mini_pc_incus_package_name }}"
    state: present
  when:
    - mini_pc_incus_install_method == "copr"
    - _mini_pc_copr.rc | default(1) == 0

- name: Install Incus from default repos (package mode)
  ansible.builtin.dnf:
    name: "{{ mini_pc_incus_package_name }}"
    state: present
  when: mini_pc_incus_install_method == "package"

- name: Enable and start qemu-guest-agent
  ansible.builtin.systemd:
    name: qemu-guest-agent
    state: started
    enabled: true
  when: mini_pc_enable_qemu_guest_agent | bool

- name: Enable and start firewalld
  ansible.builtin.systemd:
    name: firewalld
    state: started
    enabled: true

- name: Enable and start Incus
  ansible.builtin.systemd:
    name: incus
    state: started
    enabled: true
  when:
    - mini_pc_enable_incus_service | bool
    - mini_pc_incus_install_method != "none"
    - mini_pc_incus_install_method == "package" or (mini_pc_incus_install_method == "copr" and _mini_pc_copr.rc | default(1) == 0)
