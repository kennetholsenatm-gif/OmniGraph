---
# Called from lxd_devsecops_stack (expects semaphore_lxc_name, _lxc_bin, lxd_hypervisor_env, lxd_become).

- name: Render Semaphore install script (controller temp)
  ansible.builtin.template:
    src: semaphore-install.sh.j2
    dest: "/tmp/semaphore-install-{{ semaphore_lxc_name }}.sh"
    mode: "0755"
  delegate_to: localhost

- name: Push Semaphore install script into LXC
  become: "{{ lxd_become | bool }}"
  ansible.builtin.command:
    cmd: "{{ _lxc_bin }} file push /tmp/semaphore-install-{{ semaphore_lxc_name }}.sh {{ semaphore_lxc_name }}/tmp/semaphore-install.sh"
  environment: "{{ lxd_hypervisor_env }}"

- name: Run Semaphore install script inside LXC
  become: "{{ lxd_become | bool }}"
  ansible.builtin.shell: |
    {{ _lxc_bin }} exec {{ semaphore_lxc_name }} -- bash -xe /tmp/semaphore-install.sh
  environment: "{{ lxd_hypervisor_env }}"
  register: _semaphore_install

- name: Optional bind-mount host repo into LXC at /workspace
  become: "{{ lxd_become | bool }}"
  ansible.builtin.shell: |
    set -euo pipefail
    if [ -z "{{ semaphore_host_repo_path | default('') }}" ]; then
      exit 0
    fi
    if {{ _lxc_bin }} config device show "{{ semaphore_lxc_name }}" 2>/dev/null | grep -q '^repoworkspace:'; then
      exit 0
    fi
    {{ _lxc_bin }} config device add "{{ semaphore_lxc_name }}" repoworkspace disk source="{{ semaphore_host_repo_path }}" path=/workspace recursive=true
  args:
    executable: /bin/bash
  environment: "{{ lxd_hypervisor_env }}"
  when: semaphore_host_repo_path | default('') | length > 0

# IPv4 listener — browsers using http://127.0.0.1:3001 hit this path.
- name: Publish Semaphore HTTP (IPv4) from container to Incus host
  become: "{{ lxd_become | bool }}"
  ansible.builtin.shell: |
    set -euo pipefail
    if {{ _lxc_bin }} config device show "{{ semaphore_lxc_name }}" 2>/dev/null | grep -q '^semaphore_http:'; then
      exit 0
    fi
    {{ _lxc_bin }} config device add "{{ semaphore_lxc_name }}" semaphore_http proxy listen=tcp:0.0.0.0:{{ semaphore_incus_host_port }} connect=tcp:127.0.0.1:{{ semaphore_listen_port }}
  args:
    executable: /bin/bash
  environment: "{{ lxd_hypervisor_env }}"

# Many browsers resolve "localhost" to ::1 first. Without this, http://localhost:3001 can yield ERR_EMPTY_RESPONSE
# while http://127.0.0.1:3001 works (IPv4-only proxy).
- name: Publish Semaphore HTTP (IPv6 localhost) from container to Incus host
  become: "{{ lxd_become | bool }}"
  ansible.builtin.shell: |
    set -euo pipefail
    if {{ _lxc_bin }} config device show "{{ semaphore_lxc_name }}" 2>/dev/null | grep -q '^semaphore_http6:'; then
      exit 0
    fi
    {{ _lxc_bin }} config device add "{{ semaphore_lxc_name }}" semaphore_http6 proxy listen=tcp:[::]:{{ semaphore_incus_host_port }} connect=tcp:127.0.0.1:{{ semaphore_listen_port }}
  args:
    executable: /bin/bash
  environment: "{{ lxd_hypervisor_env }}"
  register: _semaphore_proxy_v6
  failed_when: false
