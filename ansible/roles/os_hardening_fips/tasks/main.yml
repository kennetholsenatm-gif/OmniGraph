---
# FIPS 140-2/140-3 and STIG-like hardening for AlmaLinux/RHEL (firewalld).
# For AlmaLinux 10 + FIPS 140-3 when available; fallback AlmaLinux 9 + FIPS 140-2.

- name: Install fips-mode-setup and dracut-fips
  ansible.builtin.dnf:
    name:
      - fips-mode-setup
      - dracut-fips
    state: present
  when: enable_fips | default(true) | bool

- name: Enable FIPS mode (kernel + OpenSSL)
  ansible.builtin.command: fips-mode-setup --enable
  changed_when: true
  when: enable_fips | default(true) | bool
  register: fips_enable
  failed_when: false  # May already be enabled

- name: Reboot if FIPS was enabled
  ansible.builtin.reboot:
    msg: "Reboot for FIPS mode"
    connect_timeout: 5
    reboot_timeout: 300
  when: enable_fips | default(true) | bool and fips_enable is changed

- name: Enable and start firewalld
  ansible.builtin.systemd:
    name: firewalld
    enabled: true
    state: started

- name: Set firewalld default zone to drop for incoming (if using public)
  ansible.builtin.command: firewall-cmd --permanent --set-target=DROP
  changed_when: true
  when: firewall_default_drop | default(true) | bool

- name: Allow SSH in firewalld
  ansible.builtin.command: firewall-cmd --permanent --add-service=ssh
  changed_when: true

- name: Allow DevSecOps internal range for required ports
  ansible.builtin.command: >
    firewall-cmd --permanent --add-rich-rule='rule family="ipv4" source address="{{ devsecops_cidr }}" port port="{{ item }}" protocol="tcp" accept'
  loop: "{{ devsecops_allowed_ports }}"
  changed_when: true
  when: devsecops_cidr is defined and devsecops_cidr | length > 0

- name: Reload firewalld
  ansible.builtin.command: firewall-cmd --reload
  changed_when: true
