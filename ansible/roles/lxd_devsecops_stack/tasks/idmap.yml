---
# Incus: "System doesn't have a functional idmap setup" — broken/partial shadow (subuid/subgid vs newuidmap) or missing root range (< 65536). Daemon reads maps at start → restart after fix.
- name: Ensure idmap tools, root subuid/subgid, and restart Incus/LXD if changed
  become: "{{ lxd_become | bool }}"
  ansible.builtin.shell: |
    CHANGED=0
    if ! command -v newuidmap >/dev/null 2>&1 || ! command -v newgidmap >/dev/null 2>&1; then
      if command -v dnf >/dev/null 2>&1; then dnf install -y shadow-utils && CHANGED=1 || true; fi
      if command -v microdnf >/dev/null 2>&1; then microdnf install -y shadow-utils && CHANGED=1 || true; fi
      if command -v yum >/dev/null 2>&1 && ! command -v dnf >/dev/null 2>&1; then yum install -y shadow-utils && CHANGED=1 || true; fi
      if command -v apt-get >/dev/null 2>&1; then apt-get update -qq && DEBIAN_FRONTEND=noninteractive apt-get install -y uidmap && CHANGED=1 || true; fi
    fi
    for f in /etc/subuid /etc/subgid; do
      if [[ ! -f "$f" ]]; then
        umask 022
        touch "$f"
        chmod 644 "$f" || true
      fi
      if ! grep -qE '^root:' "$f" 2>/dev/null; then
        echo "{{ lxd_idmap_root_line }}" >>"$f"
        CHANGED=1
      fi
    done
    if [[ "$CHANGED" -eq 1 ]]; then
      systemctl try-restart incus.service 2>/dev/null || true
      systemctl try-restart lxd.service 2>/dev/null || true
      echo LXD_ROLE_IDMAP_CHANGED
    fi
  args:
    executable: /bin/bash
  register: _idmap_setup
  changed_when: "'LXD_ROLE_IDMAP_CHANGED' in _idmap_setup.stdout"
  when: lxd_ensure_idmap | default(true) | bool
  run_once: true
