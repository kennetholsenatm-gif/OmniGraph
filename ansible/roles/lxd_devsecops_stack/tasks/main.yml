---
- name: Resolve pipeline root on controller
  ansible.builtin.set_fact:
    _pipeline_root: "{{ devsecops_pipeline_root | default(playbook_dir | dirname | dirname, true) }}"

- name: Assert pipeline root exists
  ansible.builtin.stat:
    path: "{{ _pipeline_root }}/docker-compose/stack-manifest.json"
  register: _manifest
  delegate_to: localhost
  run_once: true

- name: Fail when repo root invalid
  ansible.builtin.fail:
    msg: "Set devsecops_pipeline_root to repo root (contains docker-compose/stack-manifest.json)."
  when: not _manifest.stat.exists
  run_once: true

# Ansible's command module uses a minimal PATH. LXD snap uses /snap/bin/lxc; many distros ship Incus as `incus`.
- name: Resolve LXD or Incus CLI path
  ansible.builtin.shell: |
    set -eu
    if [[ -n "${LXD_CLI_OVERRIDE// /}" ]] && [[ -x "${LXD_CLI_OVERRIDE}" ]]; then
      echo "${LXD_CLI_OVERRIDE}"
      exit 0
    fi
    export PATH="${PATH}:/snap/bin:/usr/local/bin:/usr/sbin:/sbin"
    for name in lxc incus; do
      if x=$(command -v "${name}" 2>/dev/null); then
        echo "$x"
        exit 0
      fi
    done
    for c in \
      /snap/bin/lxc /snap/bin/incus \
      /usr/bin/lxc /usr/bin/incus \
      /usr/local/bin/lxc /usr/local/bin/incus \
      /bin/lxc /bin/incus; do
      if [[ -x "$c" ]]; then
        echo "$c"
        exit 0
      fi
    done
    echo "No lxc or incus client found. Ubuntu/WSL: snap install lxd. AlmaLinux 10: incus is not in BaseOS/CRB — add COPR neelc/incus (see repo deployments/wsl2-lxc/README.md). Or set role var lxd_cli to the full path." >&2
    exit 1
  environment:
    LXD_CLI_OVERRIDE: "{{ lxd_cli | default('', true) }}"
  args:
    executable: /bin/bash
  register: _lxc_resolve
  changed_when: false
  failed_when: false
  run_once: true

- name: Fail when LXD/Incus CLI is missing
  ansible.builtin.fail:
    msg: >-
      Could not find `lxc` or `incus`. Install one on this controller (Ubuntu/WSL: snap install lxd;
      AlmaLinux 10: COPR neelc/incus — see deployments/wsl2-lxc/README.md), or set `lxd_cli` to the full path.
      Discovery rc={{ _lxc_resolve.rc }}; stderr={{ _lxc_resolve.stderr | default('') | trim }};
      stdout={{ _lxc_resolve.stdout | default('') | trim }}
  when: _lxc_resolve.rc != 0
  run_once: true

- name: Remember LXD/Incus CLI path for this play
  ansible.builtin.set_fact:
    _lxc_bin: "{{ _lxc_resolve.stdout_lines[0] | trim }}"
  when: _lxc_resolve.rc == 0
  run_once: true

# REST/API instance create needs type + protocol + server + alias — not CLI "images:almalinux/10" as a single alias string.
- name: Derive simplestreams image alias for lxd_container module
  ansible.builtin.set_fact:
    _lxd_effective_image_alias: >-
      {{ (lxd_image | regex_replace('^images:', '') | trim)
         if (lxd_image | default('', true) is search('^images:'))
         else (lxd_image_alias | default('almalinux/10') | trim) }}
  run_once: true

# Incus/LXD CLI returns "daemon doesn't appear to be started" if the socket is down.
# Do not set become on the block: multiple privileged tasks (or block+task) can trigger "Duplicate become password prompt" with -K.
- name: Ensure Incus daemon is running (systemd + socket)
  when:
    - lxd_manage_daemon | default(true) | bool
    - (_lxc_bin | basename) == 'incus'
  block:
    - name: Start Incus and wait for API socket (single become / one sudo session)
      become: true
      ansible.builtin.shell: |
        systemctl start incus.socket incus.service || true
        set -eu
        deadline=$(($(date +%s) + {{ lxd_daemon_socket_timeout | int }}))
        while [[ $(date +%s) -lt $deadline ]]; do
          for p in /var/lib/incus/unix.socket /run/incus/unix.socket /run/incus/unix.sock; do
            if [[ -S "$p" ]]; then
              echo "$p"
              exit 0
            fi
          done
          sleep 1
        done
        echo "No Incus socket under /var/lib/incus or /run/incus. Try: sudo systemctl status incus.socket incus.service" >&2
        echo "WSL2: ensure /etc/wsl.conf has [boot] systemd=true and restart WSL." >&2
        exit 1
      args:
        executable: /bin/bash
      register: _incus_sock_discover
      changed_when: false

  rescue:
    - name: Explain Incus daemon start failure
      ansible.builtin.fail:
        msg: >-
          Incus did not become ready. As root: systemctl enable --now incus.socket incus.service;
          then try: ls -l /run/incus/unix.socket /var/lib/incus/unix.socket.
          If only /run/incus exists, use: export INCUS_SOCKET=/run/incus/unix.socket
          (or set role var lxd_incus_socket). On WSL2 enable systemd in wsl.conf and reboot WSL.
  run_once: true

- name: Ensure LXD snap daemon is running
  when:
    - lxd_manage_daemon | default(true) | bool
    - "'/snap/' in _lxc_bin"
    - (_lxc_bin | basename) == 'lxc'
  block:
    - name: Start snap LXD and wait for socket (single become)
      become: true
      ansible.builtin.shell: |
        snap start lxd || true
        set -eu
        SOCK=/var/snap/lxd/common/lxd/unix.socket
        deadline=$(($(date +%s) + {{ lxd_daemon_socket_timeout | int }}))
        while [[ $(date +%s) -lt $deadline ]]; do
          if [[ -S "$SOCK" ]]; then
            echo "$SOCK"
            exit 0
          fi
          sleep 1
        done
        echo "LXD snap socket missing: $SOCK" >&2
        exit 1
      args:
        executable: /bin/bash
      changed_when: false

  rescue:
    - name: Explain LXD snap daemon failure
      ansible.builtin.fail:
        msg: "LXD snap socket missing. Run: sudo snap start lxd  (playbook needs --become / -b for this task)."
  run_once: true

- name: Ensure LXD package daemon is running (non-snap)
  when:
    - lxd_manage_daemon | default(true) | bool
    - "'/snap/' not in _lxc_bin"
    - (_lxc_bin | basename) == 'lxc'
  block:
    - name: Start LXD systemd units and wait for socket (single become)
      become: true
      ansible.builtin.shell: |
        systemctl start lxd.socket lxd.service || true
        set -eu
        SOCK=/var/lib/lxd/unix.socket
        deadline=$(($(date +%s) + {{ lxd_daemon_socket_timeout | int }}))
        while [[ $(date +%s) -lt $deadline ]]; do
          if [[ -S "$SOCK" ]]; then
            echo "$SOCK"
            exit 0
          fi
          sleep 1
        done
        echo "LXD socket missing: $SOCK" >&2
        exit 1
      args:
        executable: /bin/bash
      changed_when: false

  rescue:
    - name: Explain LXD package daemon failure
      ansible.builtin.fail:
        msg: "LXD socket /var/lib/lxd/unix.socket missing. Enable lxd.socket / lxd.service and run lxd init. Use playbook --become (-b)."
  run_once: true

- name: Set Incus INCUS_SOCKET from role override
  ansible.builtin.set_fact:
    lxd_hypervisor_env:
      INCUS_SOCKET: "{{ lxd_incus_socket | trim }}"
  when:
    - (_lxc_bin | basename) == 'incus'
    - (lxd_incus_socket | default('', true) | trim | length) > 0
  run_once: true

- name: Set Incus INCUS_SOCKET from discovered daemon socket
  ansible.builtin.set_fact:
    lxd_hypervisor_env:
      INCUS_SOCKET: "{{ _incus_sock_discover.stdout | trim }}"
  when:
    - (_lxc_bin | basename) == 'incus'
    - (lxd_incus_socket | default('', true) | trim | length) == 0
    - _incus_sock_discover is defined
    - (_incus_sock_discover.rc | default(1)) == 0
    - (_incus_sock_discover.stdout | default('') | trim | length) > 0
  run_once: true

- name: Default empty extra env for LXD/snap clients
  ansible.builtin.set_fact:
    lxd_hypervisor_env: {}
  when: lxd_hypervisor_env is not defined
  run_once: true

# Inline LXD profile steps (avoids CRLF in repo .sh on /mnt/c/ breaking bash).
# lxd_hypervisor_env sets INCUS_SOCKET when the daemon uses /run/incus/unix.socket (common on EL COPR).
- name: Check LXD profile exists
  become: true
  ansible.builtin.command:
    argv: ["{{ _lxc_bin }}", profile, show, "{{ lxd_docker_profile }}"]
  environment: "{{ lxd_hypervisor_env }}"
  register: _lxd_prof_show
  changed_when: false
  failed_when: false
  run_once: true

- name: Create LXD profile when missing
  become: true
  ansible.builtin.command:
    argv: ["{{ _lxc_bin }}", profile, create, "{{ lxd_docker_profile }}"]
  environment: "{{ lxd_hypervisor_env }}"
  when: _lxd_prof_show.rc != 0
  run_once: true

# Incus: `description` is a profile property, not instance config — use key=value and -p (see incus profile set --help).
# LXD: legacy `lxc profile set PROFILE description "text"` still works.
- name: Set docker-nesting profile description (Incus)
  become: true
  ansible.builtin.command:
    argv:
      - "{{ _lxc_bin }}"
      - profile
      - set
      - "{{ lxd_docker_profile }}"
      - "description=Nested Docker (DevSecOps pipeline)"
      - "-p"
  environment: "{{ lxd_hypervisor_env }}"
  changed_when: false
  run_once: true
  when: (_lxc_bin | basename) == 'incus'

- name: Set docker-nesting profile description (LXD)
  become: true
  ansible.builtin.command:
    argv: ["{{ _lxc_bin }}", profile, set, "{{ lxd_docker_profile }}", description, "Nested Docker (DevSecOps pipeline)"]
  environment: "{{ lxd_hypervisor_env }}"
  changed_when: false
  run_once: true
  when: (_lxc_bin | basename) != 'incus'

# Incus `profile set` expects key=value (see incus profile set). `command` ignores args.executable, so && chains never ran in bash.
- name: Enable nesting and syscall intercepts on profile (Incus)
  become: true
  ansible.builtin.command:
    argv:
      - "{{ _lxc_bin }}"
      - profile
      - set
      - "{{ lxd_docker_profile }}"
      - "{{ item }}"
  environment: "{{ lxd_hypervisor_env }}"
  loop:
    - security.nesting=true
    - security.syscalls.intercept.mknod=true
    - security.syscalls.intercept.setxattr=true
  changed_when: false
  run_once: true
  when: (_lxc_bin | basename) == 'incus'

- name: Enable nesting and syscall intercepts on profile (LXD)
  become: true
  ansible.builtin.shell:
    cmd: |
      set -eu
      {{ _lxc_bin }} profile set {{ lxd_docker_profile }} security.nesting true
      {{ _lxc_bin }} profile set {{ lxd_docker_profile }} security.syscalls.intercept.mknod true
      {{ _lxc_bin }} profile set {{ lxd_docker_profile }} security.syscalls.intercept.setxattr true
  args:
    executable: /bin/bash
  environment: "{{ lxd_hypervisor_env }}"
  changed_when: false
  run_once: true
  when: (_lxc_bin | basename) != 'incus'

- name: Unset linux.kernel_modules on profile when disabled (Incus)
  become: true
  ansible.builtin.command:
    argv: ["{{ _lxc_bin }}", profile, unset, "{{ lxd_docker_profile }}", linux.kernel_modules]
  environment: "{{ lxd_hypervisor_env }}"
  changed_when: false
  failed_when: false
  run_once: true
  when:
    - (_lxc_bin | basename) == 'incus'
    - (lxd_docker_profile_kernel_modules | default('', true) | trim | length) == 0

- name: Unset linux.kernel_modules on profile when disabled (LXD)
  become: true
  ansible.builtin.command:
    argv: ["{{ _lxc_bin }}", profile, unset, "{{ lxd_docker_profile }}", linux.kernel_modules]
  environment: "{{ lxd_hypervisor_env }}"
  changed_when: false
  failed_when: false
  run_once: true
  when:
    - (_lxc_bin | basename) != 'incus'
    - (lxd_docker_profile_kernel_modules | default('', true) | trim | length) == 0

- name: Set linux.kernel_modules on profile (Incus)
  become: true
  ansible.builtin.command:
    argv:
      - "{{ _lxc_bin }}"
      - profile
      - set
      - "{{ lxd_docker_profile }}"
      - "linux.kernel_modules={{ lxd_docker_profile_kernel_modules | trim }}"
  environment: "{{ lxd_hypervisor_env }}"
  changed_when: false
  run_once: true
  when:
    - (_lxc_bin | basename) == 'incus'
    - (lxd_docker_profile_kernel_modules | default('', true) | trim | length) > 0

- name: Set linux.kernel_modules on profile (LXD)
  become: true
  ansible.builtin.command:
    argv:
      - "{{ _lxc_bin }}"
      - profile
      - set
      - "{{ lxd_docker_profile }}"
      - linux.kernel_modules
      - "{{ lxd_docker_profile_kernel_modules | trim }}"
  environment: "{{ lxd_hypervisor_env }}"
  changed_when: false
  run_once: true
  when:
    - (_lxc_bin | basename) != 'incus'
    - (lxd_docker_profile_kernel_modules | default('', true) | trim | length) > 0

- name: Normalize docker-nesting profile raw.lxc (strip CRLF from /mnt/c/ checkouts)
  ansible.builtin.set_fact:
    _lxd_docker_raw_lxc_effective: >-
      {{
        (lxd_docker_profile_raw_lxc | default('', true))
        | regex_replace('\r\n', '\n')
        | regex_replace('\r', '\n')
        | trim
      }}
  run_once: true

- name: Unset raw.lxc on profile when disabled (Incus)
  become: true
  ansible.builtin.command:
    argv: ["{{ _lxc_bin }}", profile, unset, "{{ lxd_docker_profile }}", raw.lxc]
  environment: "{{ lxd_hypervisor_env }}"
  changed_when: false
  failed_when: false
  run_once: true
  when:
    - (_lxc_bin | basename) == 'incus'
    - (_lxd_docker_raw_lxc_effective | default('') | length) == 0

- name: Unset raw.lxc on profile when disabled (LXD)
  become: true
  ansible.builtin.command:
    argv: ["{{ _lxc_bin }}", profile, unset, "{{ lxd_docker_profile }}", raw.lxc]
  environment: "{{ lxd_hypervisor_env }}"
  changed_when: false
  failed_when: false
  run_once: true
  when:
    - (_lxc_bin | basename) != 'incus'
    - (_lxd_docker_raw_lxc_effective | default('') | length) == 0

- name: Set raw.lxc for Docker-in-LXC (Incus)
  become: true
  ansible.builtin.command:
    argv:
      - "{{ _lxc_bin }}"
      - profile
      - set
      - "{{ lxd_docker_profile }}"
      - "{{ 'raw.lxc=' ~ _lxd_docker_raw_lxc_effective }}"
  environment: "{{ lxd_hypervisor_env }}"
  changed_when: false
  run_once: true
  when:
    - (_lxc_bin | basename) == 'incus'
    - (_lxd_docker_raw_lxc_effective | default('') | length) > 0

- name: Set raw.lxc for Docker-in-LXC (LXD)
  become: true
  ansible.builtin.command:
    argv:
      - "{{ _lxc_bin }}"
      - profile
      - set
      - "{{ lxd_docker_profile }}"
      - raw.lxc
      - "{{ _lxd_docker_raw_lxc_effective }}"
  environment: "{{ lxd_hypervisor_env }}"
  changed_when: false
  run_once: true
  when:
    - (_lxc_bin | basename) != 'incus'
    - (_lxd_docker_raw_lxc_effective | default('') | length) > 0

# community.general.lxd_container uses pylxd; default url is unix:/var/lib/lxd/unix.socket (not Incus). INCUS_SOCKET is not read by pylxd.
- name: Set pylxd unix URL for lxd_container module (Incus)
  ansible.builtin.set_fact:
    _lxd_pylxd_url: "{{ 'unix:' ~ (lxd_hypervisor_env['INCUS_SOCKET'] | trim) }}"
  when:
    - (_lxc_bin | basename) == 'incus'
    - (lxd_hypervisor_env['INCUS_SOCKET'] | default('') | trim | length) > 0
  run_once: true

- name: Fail when Incus API socket unknown (pylxd cannot use INCUS_SOCKET env alone)
  ansible.builtin.fail:
    msg: >-
      community.general.lxd_container connects to unix:/var/lib/lxd/unix.socket by default.
      For Incus, set role var lxd_incus_socket (e.g. /run/incus/unix.socket) or keep lxd_manage_daemon: true
      so the role discovers the socket and passes url=unix:... to the module.
  when:
    - (_lxc_bin | basename) == 'incus'
    - (lxd_hypervisor_env['INCUS_SOCKET'] | default('') | trim | length) == 0
  run_once: true

# Fresh Incus (e.g. COPR) may have no "default" storage pool or no root disk on profile "default" → instance create fails with "No root device could be found".
- name: Check default storage pool exists
  become: true
  ansible.builtin.command:
    argv: ["{{ _lxc_bin }}", storage, info, "{{ lxd_storage_pool_name }}"]
  environment: "{{ lxd_hypervisor_env }}"
  register: _lxd_pool_default
  changed_when: false
  failed_when: false
  run_once: true
  when: lxd_ensure_default_storage | default(true) | bool

- name: Create default dir storage pool when missing
  become: true
  ansible.builtin.command:
    argv: ["{{ _lxc_bin }}", storage, create, "{{ lxd_storage_pool_name }}", dir]
  environment: "{{ lxd_hypervisor_env }}"
  when:
    - lxd_ensure_default_storage | default(true) | bool
    - _lxd_pool_default is defined
    - _lxd_pool_default.rc != 0
  run_once: true

# `profile device show default root` is unreliable on some Incus builds (rc != 0 even when root exists) → spurious add → "already exists".
- name: Ensure default profile has root disk device
  become: true
  ansible.builtin.command:
    argv:
      - "{{ _lxc_bin }}"
      - profile
      - device
      - add
      - default
      - root
      - disk
      - path=/
      - "pool={{ lxd_storage_pool_name }}"
  environment: "{{ lxd_hypervisor_env }}"
  register: _lxd_default_root
  failed_when:
    - _lxd_default_root.rc != 0
    - ('already exists' not in (_lxd_default_root.stderr | default('')))
  changed_when: _lxd_default_root.rc == 0
  when: lxd_ensure_default_storage | default(true) | bool
  run_once: true

# Incus: "System doesn't have a functional idmap setup" — broken/partial shadow (subuid/subgid vs newuidmap) or missing root range (< 65536). Daemon reads maps at start → restart after fix.
- name: Ensure idmap tools, root subuid/subgid, and restart Incus/LXD if changed
  become: true
  ansible.builtin.shell: |
    CHANGED=0
    if ! command -v newuidmap >/dev/null 2>&1 || ! command -v newgidmap >/dev/null 2>&1; then
      if command -v dnf >/dev/null 2>&1; then dnf install -y shadow-utils && CHANGED=1 || true; fi
      if command -v microdnf >/dev/null 2>&1; then microdnf install -y shadow-utils && CHANGED=1 || true; fi
      if command -v yum >/dev/null 2>&1 && ! command -v dnf >/dev/null 2>&1; then yum install -y shadow-utils && CHANGED=1 || true; fi
      if command -v apt-get >/dev/null 2>&1; then apt-get update -qq && DEBIAN_FRONTEND=noninteractive apt-get install -y uidmap && CHANGED=1 || true; fi
    fi
    for f in /etc/subuid /etc/subgid; do
      if [[ ! -f "$f" ]]; then
        umask 022
        touch "$f"
        chmod 644 "$f" || true
      fi
      if ! grep -qE '^root:' "$f" 2>/dev/null; then
        echo "{{ lxd_idmap_root_line }}" >>"$f"
        CHANGED=1
      fi
    done
    if [[ "$CHANGED" -eq 1 ]]; then
      systemctl try-restart incus.service 2>/dev/null || true
      systemctl try-restart lxd.service 2>/dev/null || true
      echo LXD_ROLE_IDMAP_CHANGED
    fi
  args:
    executable: /bin/bash
  register: _idmap_setup
  changed_when: "'LXD_ROLE_IDMAP_CHANGED' in _idmap_setup.stdout"
  when: lxd_ensure_idmap | default(true) | bool
  run_once: true

- name: Build filtered container list
  ansible.builtin.set_fact:
    _containers: >-
      {{
        lxd_devsecops_containers
        if (lxd_apply_names | default([]) | length) == 0
        else lxd_devsecops_containers | selectattr('name', 'in', lxd_apply_names) | list
      }}

- name: Derive managed bridge name
  ansible.builtin.set_fact:
    _lxd_managed_bridge_name: >-
      {{
        (lxd_managed_bridge_name | default('') | trim)
        if (lxd_managed_bridge_name | default('') | trim | length) > 0
        else ('incusbr0' if ((_lxc_bin | basename) == 'incus') else 'lxdbr0')
      }}
  run_once: true
  when: lxd_ensure_managed_bridge | default(true) | bool

- name: Ensure managed bridge exists
  become: true
  ansible.builtin.shell: |
    {{ _lxc_bin }} network show {{ _lxd_managed_bridge_name }} >/dev/null 2>&1 && exit 0
    {{ _lxc_bin }} network create {{ _lxd_managed_bridge_name }} \
      ipv4.address=auto ipv4.nat=true ipv6.address=none
  args:
    executable: /bin/bash
  environment: "{{ lxd_hypervisor_env }}"
  register: _managed_bridge_create
  changed_when: "'Network ' in (_managed_bridge_create.stdout | default(''))"
  failed_when: _managed_bridge_create.rc != 0
  run_once: true
  when: lxd_ensure_managed_bridge | default(true) | bool

- name: Ensure default profile has bridged NIC
  become: true
  ansible.builtin.shell: |
    {{ _lxc_bin }} profile device add default eth0 nic nictype=bridged parent={{ _lxd_managed_bridge_name }} name=eth0
  args:
    executable: /bin/bash
  environment: "{{ lxd_hypervisor_env }}"
  register: _default_nic_add
  changed_when: >
    'Device eth0 added to default' in ((_default_nic_add.stdout | default('')) ~ ' ' ~ (_default_nic_add.stderr | default('')))
  failed_when: >
    (_default_nic_add.rc != 0) and
    ('already exists' not in ((_default_nic_add.stdout | default('')) ~ ' ' ~ (_default_nic_add.stderr | default('')) | lower))
  run_once: true
  when: lxd_ensure_managed_bridge | default(true) | bool

- name: Launch or start LXD instances (Alma + docker-nesting profile)
  become: true
  community.general.lxd_container:
    name: "{{ item.name }}"
    url: "{{ _lxd_pylxd_url | default(omit) }}"
    state: started
    source:
      type: image
      mode: pull
      protocol: simplestreams
      server: "{{ lxd_image_simplestreams_server }}"
      alias: "{{ _lxd_effective_image_alias }}"
    profiles:
      - default
      - "{{ lxd_docker_profile }}"
  environment: "{{ lxd_hypervisor_env }}"
  loop: "{{ _containers }}"
  loop_control:
    label: "{{ item.name }}"

- name: Push host resolv.conf into instance (optional DNS workaround)
  become: true
  ansible.builtin.command:
    argv:
      - "{{ _lxc_bin }}"
      - file
      - push
      - /etc/resolv.conf
      - "{{ item.name }}/etc/resolv.conf"
  environment: "{{ lxd_hypervisor_env }}"
  loop: "{{ _containers }}"
  loop_control:
    label: "{{ item.name }}"
  when: lxd_sync_host_resolv_conf | default(false) | bool
  changed_when: true

- name: Prepare fallback DNS lines for in-container resolv.conf
  ansible.builtin.set_fact:
    _lxd_fallback_resolv_lines: "{{ (lxd_dns_fallback_servers | default([])) | map('regex_replace', '^(.*)$', 'nameserver \\1') | list }}"
  run_once: true

- name: Ensure container DNS is resolvable before package install
  become: true
  ansible.builtin.shell: |
    {{ _lxc_bin }} exec {{ item.name }} -- bash -ec '
    if getent hosts mirrors.almalinux.org >/dev/null 2>&1; then
      echo DNS_OK
      exit 0
    fi
    if [ "{{ lxd_dns_fallback_enabled | default(true) | bool | lower }}" = "true" ] && [ "{{ _lxd_fallback_resolv_lines | length }}" -gt 0 ]; then
      for ns in {{ lxd_dns_fallback_servers | default([]) | join(' ') }}; do
        echo "nameserver ${ns}"
      done >/etc/resolv.conf
      if getent hosts mirrors.almalinux.org >/dev/null 2>&1; then
        echo DNS_FIXED
        exit 0
      fi
    fi
    echo "ERROR: No DNS inside this container (cannot resolve mirrors.almalinux.org)." >&2
    echo "Fix Incus/LXD DNS, or set lxd_dns_fallback_servers/lxd_dns_fallback_enabled, or skip install with -e lxd_install_docker_in_instance=false." >&2
    exit 1
    '
  args:
    executable: /bin/bash
  environment: "{{ lxd_hypervisor_env }}"
  loop: "{{ _containers }}"
  loop_control:
    label: "{{ item.name }}"
  register: _dns_bootstrap
  changed_when: "'DNS_FIXED' in (_dns_bootstrap.stdout | default(''))"
  failed_when: _dns_bootstrap.rc != 0
  when: lxd_install_docker_in_instance | default(true) | bool

- name: Install Docker CE inside instance when missing
  become: true
  ansible.builtin.shell: |
    {{ _lxc_bin }} exec {{ item.name }} -- bash -ec '
    if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then exit 0; fi
    dnf install -y dnf-plugins-core curl
    dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo || true
    dnf install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin git jq openssl
    systemctl enable docker 2>/dev/null || true
    systemctl start docker 2>/dev/null || true
    '
  args:
    executable: /bin/bash
  environment: "{{ lxd_hypervisor_env }}"
  loop: "{{ _containers }}"
  loop_control:
    label: "{{ item.name }}"
  register: _dock
  changed_when: true
  failed_when: _dock.rc != 0
  when: lxd_install_docker_in_instance | default(true) | bool

- name: Ensure target directories in instance
  become: true
  ansible.builtin.command:
    cmd: "{{ _lxc_bin }} exec {{ item.name }} -- mkdir -p /opt/devsecops-pipeline/scripts"
  environment: "{{ lxd_hypervisor_env }}"
  loop: "{{ _containers }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: true

- name: Push docker-compose directory into instance
  become: true
  ansible.builtin.command:
    cmd: "{{ _lxc_bin }} file push -pr {{ _pipeline_root }}/docker-compose {{ item.name }}/opt/devsecops-pipeline/"
  environment: "{{ lxd_hypervisor_env }}"
  loop: "{{ _containers }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: true

- name: Push single-pane-of-glass for gateway instance
  become: true
  ansible.builtin.command:
    cmd: "{{ _lxc_bin }} file push -pr {{ _pipeline_root }}/single-pane-of-glass {{ item.name }}/opt/devsecops-pipeline/"
  environment: "{{ lxd_hypervisor_env }}"
  loop: "{{ _containers }}"
  when: item.name == 'devsecops-gateway'
  loop_control:
    label: "{{ item.name }}"
  changed_when: true

- name: Push create-networks.sh
  become: true
  ansible.builtin.command:
    cmd: "{{ _lxc_bin }} file push {{ _pipeline_root }}/scripts/create-networks.sh {{ item.name }}/opt/devsecops-pipeline/scripts/create-networks.sh"
  environment: "{{ lxd_hypervisor_env }}"
  loop: "{{ _containers }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: true

- name: Push secrets-bootstrap.sh
  become: true
  ansible.builtin.command:
    cmd: "{{ _lxc_bin }} file push {{ _pipeline_root }}/scripts/secrets-bootstrap.sh {{ item.name }}/opt/devsecops-pipeline/scripts/secrets-bootstrap.sh"
  environment: "{{ lxd_hypervisor_env }}"
  loop: "{{ _containers }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: true

- name: Normalize shell script line endings in container
  become: true
  ansible.builtin.command:
    cmd: "{{ _lxc_bin }} exec {{ item.name }} -- bash -lc \"sed -i 's/\\r$//' /opt/devsecops-pipeline/scripts/create-networks.sh /opt/devsecops-pipeline/scripts/secrets-bootstrap.sh\""
  environment: "{{ lxd_hypervisor_env }}"
  loop: "{{ _containers }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: true

- name: Ensure scripts executable in container
  become: true
  ansible.builtin.command:
    cmd: "{{ _lxc_bin }} exec {{ item.name }} -- chmod +x /opt/devsecops-pipeline/scripts/create-networks.sh /opt/devsecops-pipeline/scripts/secrets-bootstrap.sh"
  environment: "{{ lxd_hypervisor_env }}"
  loop: "{{ _containers }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: true

- name: Create Docker networks inside instance
  become: true
  ansible.builtin.command:
    cmd: "{{ _lxc_bin }} exec {{ item.name }} -- bash /opt/devsecops-pipeline/scripts/create-networks.sh"
  environment: "{{ lxd_hypervisor_env }}"
  loop: "{{ _containers }}"
  loop_control:
    label: "{{ item.name }}"
  register: _nets
  changed_when: true

- name: Run docker compose inside instance (optional)
  become: true
  when: devsecops_lxc_compose_up | default(false) | bool
  ansible.builtin.shell: |
    {{ _lxc_bin }} exec {{ item.name }} -- bash -lc 'cd /opt/devsecops-pipeline/{{ item.compose_dir }} && docker compose {{ item.compose_cli }} up -d --remove-orphans'
  args:
    executable: /bin/bash
  environment: "{{ lxd_hypervisor_env }}"
  loop: "{{ _containers }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: true
