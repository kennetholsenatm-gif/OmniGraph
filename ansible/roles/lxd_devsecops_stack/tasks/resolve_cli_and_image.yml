---
# Ansible's command module uses a minimal PATH. LXD snap uses /snap/bin/lxc; many distros ship Incus as `incus`.
- name: Resolve LXD or Incus CLI path
  ansible.builtin.shell: |
    set -eu
    if [[ -n "${LXD_CLI_OVERRIDE// /}" ]] && [[ -x "${LXD_CLI_OVERRIDE}" ]]; then
      echo "${LXD_CLI_OVERRIDE}"
      exit 0
    fi
    export PATH="${PATH}:/snap/bin:/usr/local/bin:/usr/sbin:/sbin"
    for name in lxc incus; do
      if x=$(command -v "${name}" 2>/dev/null); then
        echo "$x"
        exit 0
      fi
    done
    for c in \
      /snap/bin/lxc /snap/bin/incus \
      /usr/bin/lxc /usr/bin/incus \
      /usr/local/bin/lxc /usr/local/bin/incus \
      /bin/lxc /bin/incus; do
      if [[ -x "$c" ]]; then
        echo "$c"
        exit 0
      fi
    done
    echo "No lxc or incus client found. Ubuntu/WSL: snap install lxd. AlmaLinux 10: incus is not in BaseOS/CRB — add COPR neelc/incus (see repo deployments/wsl2-lxc/README.md). Or set role var lxd_cli to the full path." >&2
    exit 1
  environment:
    LXD_CLI_OVERRIDE: "{{ lxd_cli | default('', true) }}"
  args:
    executable: /bin/bash
  register: _lxc_resolve
  changed_when: false
  failed_when: false
  run_once: true

- name: Fail when LXD/Incus CLI is missing
  ansible.builtin.fail:
    msg: >-
      Could not find `lxc` or `incus`. Install one on this controller (Ubuntu/WSL: snap install lxd;
      AlmaLinux 10: COPR neelc/incus — see deployments/wsl2-lxc/README.md), or set `lxd_cli` to the full path.
      Discovery rc={{ _lxc_resolve.rc }}; stderr={{ _lxc_resolve.stderr | default('') | trim }};
      stdout={{ _lxc_resolve.stdout | default('') | trim }}
  when: _lxc_resolve.rc != 0
  run_once: true

- name: Remember LXD/Incus CLI path for this play
  ansible.builtin.set_fact:
    _lxc_bin: "{{ _lxc_resolve.stdout_lines[0] | trim }}"
  when: _lxc_resolve.rc == 0
  run_once: true

# REST/API instance create needs type + protocol + server + alias — not CLI "images:almalinux/10" as a single alias string.
- name: Derive simplestreams image alias for lxd_container module
  ansible.builtin.set_fact:
    _lxd_effective_image_alias: >-
      {{ (lxd_image | regex_replace('^images:', '') | trim)
         if (lxd_image | default('', true) is search('^images:'))
         else (lxd_image_alias | default('almalinux/10') | trim) }}
  run_once: true
