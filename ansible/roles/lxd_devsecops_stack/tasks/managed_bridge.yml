---
- name: Derive managed bridge name
  ansible.builtin.set_fact:
    _lxd_managed_bridge_name: >-
      {{
        (lxd_managed_bridge_name | default('') | trim)
        if (lxd_managed_bridge_name | default('') | trim | length) > 0
        else ('incusbr0' if ((_lxc_bin | basename) == 'incus') else 'lxdbr0')
      }}
  run_once: true
  when: lxd_ensure_managed_bridge | default(true) | bool

- name: Ensure managed bridge exists
  become: "{{ lxd_become | bool }}"
  ansible.builtin.shell: |
    {{ _lxc_bin }} network show {{ _lxd_managed_bridge_name }} >/dev/null 2>&1 && exit 0
    {{ _lxc_bin }} network create {{ _lxd_managed_bridge_name }} \
      ipv4.address=auto ipv4.nat=true ipv4.dhcp=true ipv6.address=none
  args:
    executable: /bin/bash
  environment: "{{ lxd_hypervisor_env }}"
  register: _managed_bridge_create
  changed_when: "'Network ' in (_managed_bridge_create.stdout | default(''))"
  failed_when: _managed_bridge_create.rc != 0
  run_once: true
  when: lxd_ensure_managed_bridge | default(true) | bool

- name: Tune managed bridge for NAT, DHCP, and DNS (upstream resolvers)
  become: "{{ lxd_become | bool }}"
  ansible.builtin.shell: |
    set -euo pipefail
    BR="{{ _lxd_managed_bridge_name }}"
    NS="{{ lxd_bridge_dns_nameservers | join(',') }}"
    {{ _lxc_bin }} network set "${BR}" \
      dns.mode=managed \
      ipv4.nat=true \
      ipv4.dhcp=true \
      dns.nameservers="${NS}"
  args:
    executable: /bin/bash
  environment: "{{ lxd_hypervisor_env }}"
  register: _managed_bridge_dns
  changed_when: true
  run_once: true
  when:
    - lxd_ensure_managed_bridge | default(true) | bool
    - lxd_bridge_tune_dns | default(true) | bool
    - (lxd_bridge_dns_nameservers | default([]) | length) > 0

- name: Ensure default profile has bridged NIC
  become: "{{ lxd_become | bool }}"
  ansible.builtin.shell: |
    {{ _lxc_bin }} profile device add default eth0 nic nictype=bridged parent={{ _lxd_managed_bridge_name }} name=eth0
  args:
    executable: /bin/bash
  environment: "{{ lxd_hypervisor_env }}"
  register: _default_nic_add
  changed_when: >
    'Device eth0 added to default' in ((_default_nic_add.stdout | default('')) ~ ' ' ~ (_default_nic_add.stderr | default('')))
  failed_when: >
    (_default_nic_add.rc != 0) and
    ('already exists' not in ((_default_nic_add.stdout | default('')) ~ ' ' ~ (_default_nic_add.stderr | default('')) | lower))
  run_once: true
  when: lxd_ensure_managed_bridge | default(true) | bool
