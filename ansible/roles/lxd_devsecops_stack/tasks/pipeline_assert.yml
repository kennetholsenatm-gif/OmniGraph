---
- name: Resolve pipeline root on controller
  ansible.builtin.set_fact:
    _pipeline_root: "{{ devsecops_pipeline_root | default(playbook_dir | dirname | dirname, true) }}"

- name: Assert pipeline root exists
  ansible.builtin.stat:
    path: "{{ _pipeline_root }}/docker-compose/stack-manifest.json"
  register: _manifest
  delegate_to: localhost
  run_once: true

- name: Fail when repo root invalid
  ansible.builtin.fail:
    msg: "Set devsecops_pipeline_root to repo root (contains docker-compose/stack-manifest.json)."
  when: not _manifest.stat.exists
  run_once: true
