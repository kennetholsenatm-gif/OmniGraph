---
- name: Ensure VLAN database entries exist
  cisco.ios.ios_vlans:
    config:
      - vlan_id: "{{ item.id }}"
        name: "{{ item.name }}"
    state: merged
  loop: "{{ c3560cx_vlans }}"
  when: c3560cx_vlans | length > 0

- name: Configure trunk uplinks
  cisco.ios.ios_config:
    parents:
      - "interface {{ item.name }}"
    lines:
      - switchport trunk encapsulation dot1q
      - switchport mode trunk
      - "switchport trunk allowed vlan {{ item.allowed_vlans }}"
  loop: "{{ c3560cx_uplink_interfaces }}"
  when:
    - c3560cx_uplink_interfaces | length > 0
    - item.mode | default('trunk') == 'trunk'

- name: Configure access ports
  cisco.ios.ios_config:
    parents:
      - "interface {{ item.interface }}"
    lines:
      - switchport mode access
      - "switchport access vlan {{ item.vlan }}"
  loop: "{{ c3560cx_access_ports }}"
  when: c3560cx_access_ports | length > 0

- name: Spanning-tree mode
  cisco.ios.ios_config:
    lines:
      - "spanning-tree mode {{ c3560cx_spanning_tree_mode }}"
  when: c3560cx_spanning_tree_mode | length > 0
