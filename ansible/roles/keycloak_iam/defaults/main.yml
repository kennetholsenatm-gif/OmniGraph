# Keycloak IAM as code: automation client + OIDC clients (gitea, n8n, zammad).
# Auth: keycloak_username + keycloak_password (bootstrap admin from Vault) or automation client token.
# Keycloak URL: from host that runs the play (e.g. http://127.0.0.1:8180 or http://localhost/keycloak).

keycloak_iam_realm: "master"
keycloak_iam_url: "http://127.0.0.1:8180"
keycloak_iam_validate_certs: false
keycloak_iam_gateway_base_url: "http://localhost"

# Automation client (service account) for scripts/Ansible
keycloak_iam_automation_client_id: "devsecops-automation"

# OIDC app clients
keycloak_iam_gitea_redirect: "{{ keycloak_iam_gateway_base_url }}/gitea/user/oauth2/Keycloak/callback"
keycloak_iam_n8n_redirect: "{{ keycloak_iam_gateway_base_url }}/n8n/rest/sso/oidc/callback"
keycloak_iam_zammad_redirect: "{{ keycloak_iam_gateway_base_url }}/zammad/auth/openid_connect/callback"
