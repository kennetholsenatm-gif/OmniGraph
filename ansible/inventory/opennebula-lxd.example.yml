---
# Copy to opennebula-lxd.yml (gitignored locally). LXD/Incus runs ON this Alma host (often an OpenNebula KVM guest).
#
# ansible-playbook -i inventory/opennebula-lxd.yml playbooks/deploy-devsecops-lxc.yml \
#   -e 'lxd_apply_names=["devsecops-iam","devsecops-messaging","devsecops-tooling","devsecops-gateway"]' -K
#
# Requires: community.general (lxd_container), working incus/lxc on the target host, docker-nesting profile.
all:
  children:
    lxd_hosts:
      hosts:
        on-lxd-01:
          ansible_host: 192.168.86.50
          ansible_user: alma
          ansible_become: true
          # Optional if static binaries:
          # lxd_cli: /usr/bin/incus
          # lxd_incus_socket: /run/incus/unix.socket
