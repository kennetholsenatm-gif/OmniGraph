---
# OpenNebula hybrid: LXD host(s) for compose-based LXCs + optional K3s node for Helm (Gitea chart).
# Copy to opennebula-hybrid.yml (gitignored locally) and adjust IPs from VLAN_MATRIX / network design.
#
# Usage:
#   cd ansible
#   ansible-playbook -i inventory/opennebula-hybrid.yml playbooks/opennebula-hybrid-site.yml -K
#
# Optional stacks on LXD (match stack-manifest / lxd_optional_stack_enable), e.g.:
#   -e '{"lxd_optional_stack_enable":{"siem":true,"discovery":true}}'
#
# Helm play (second play) runs only when group opennebula_k3s_helm has hosts and
# opennebula_helm_gitea_enabled is true (host or group var).
all:
  children:
    lxd_hosts:
      hosts:
        on-lxd-hypervisor:
          ansible_host: 192.168.86.50
          ansible_user: alma
          ansible_become: true
          # lxd_cli: /usr/bin/incus
          # lxd_incus_socket: /run/incus/unix.socket
    opennebula_k3s_helm:
      hosts:
        k3s-control-01:
          ansible_host: 100.64.1.30
          ansible_user: alma
          ansible_become: true
          # Set true on this host (or in group_vars) to run kubernetes.core.helm in the second play.
          opennebula_helm_gitea_enabled: false
          opennebula_kubeconfig_path: /etc/rancher/k3s/k3s.yaml
          # Optional: path to real values file (copy from deployments/opennebula-gitea/helm/*.example.yaml)
          # opennebula_gitea_values_file: /opt/devsecops/helm/gitea-values.yaml
