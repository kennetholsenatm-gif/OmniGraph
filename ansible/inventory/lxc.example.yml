---
# LXD runs on this host (WSL2 Alma or Ubuntu with LXD snap). Connection: local.
all:
  children:
    lxd_hosts:
      hosts:
        localhost:
          ansible_connection: local
          # If discovery fails: set full path to lxc OR incus (e.g. /snap/bin/lxc, /usr/bin/incus)
          # lxd_cli: /snap/bin/lxc
          # If incus client defaults to the wrong socket (EL COPR often uses /run/incus/unix.socket):
          # lxd_incus_socket: /run/incus/unix.socket
