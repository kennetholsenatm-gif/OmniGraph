---
# Deploy discovery stack (NetBox, Dependency-Track, optional NetDISCO) on discovery_net.
# Requires: Docker, community.docker, community.general (UFW). RHEL/Alma: firewalld (firewall-cmd).
# See docs/ADR_FULLSTACK_DISCOVERY.md and docker-compose/docker-compose.discovery.yml
#
# Usage:
#   cd ansible
#   ansible-playbook -i inventory.yml playbooks/deploy-fullstack-discovery.yml
#
# Provide NetBox / discovery secrets via `docker-compose/.env` (from Vault) or Ansible extra vars
# that your wrapper exports before `docker compose`. Compose requires NETBOX_* variables — see devsecops.env.schema.
#
# Optional NetDISCO:
#   ansible-playbook ... -e discovery_enable_netdisco=true
- name: Deploy full-stack discovery (discovery_net + compose + host firewall)
  hosts: ai_mesh_nodes
  become: true
  vars:
    discovery_net_cidr: "100.64.40.0/24"
    discovery_compose_dir: "{{ playbook_dir }}/../../docker-compose"
    discovery_compose_file: "docker-compose.discovery.yml"
    discovery_enable_netdisco: false
    # Host-published ports for discovery UIs (align with docker-compose.discovery.yml)
    discovery_netbox_port: 8000
    discovery_dep_track_port: 8081

  tasks:
    - name: Ensure discovery_net Docker network exists
      community.docker.docker_network:
        name: discovery_net
        driver: bridge
        ipam_config:
          - subnet: "{{ discovery_net_cidr }}"

    - name: Deploy discovery stack (docker compose v2)
      community.docker.docker_compose_v2:
        project_src: "{{ discovery_compose_dir }}"
        files:
          - "{{ discovery_compose_file }}"
        profiles: "{{ ['netdisco'] if discovery_enable_netdisco | bool else [] }}"
        state: present

    - name: UFW default deny incoming (Debian family)
      community.general.ufw:
        state: enabled
        direction: incoming
        policy: deny
      when: ansible_os_family == "Debian"

    - name: UFW allow discovery segment to NetBox and Dependency-Track TCP ports
      community.general.ufw:
        rule: allow
        from_ip: "{{ discovery_net_cidr }}"
        port: "{{ item }}"
        proto: tcp
      loop:
        - "{{ discovery_netbox_port | string }}"
        - "{{ discovery_dep_track_port | string }}"
      when: ansible_os_family == "Debian"

    - name: UFW allow SNMP and LLDP from discovery_net (NetDISCO / switches)
      community.general.ufw:
        rule: allow
        from_ip: "{{ discovery_net_cidr }}"
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
      loop:
        - { port: "161", proto: udp }
        - { port: "162", proto: udp }
      when: ansible_os_family == "Debian"

    - name: Firewalld — discovery_net to NetBox, Dependency-Track, SNMP (RHEL family)
      ansible.builtin.shell: |
        set -e
        for rule in \
          'rule family="ipv4" source address="{{ discovery_net_cidr }}" port port="{{ discovery_netbox_port }}" protocol="tcp" accept' \
          'rule family="ipv4" source address="{{ discovery_net_cidr }}" port port="{{ discovery_dep_track_port }}" protocol="tcp" accept' \
          'rule family="ipv4" source address="{{ discovery_net_cidr }}" port port="161" protocol="udp" accept'
        do
          firewall-cmd --permanent --add-rich-rule="$rule" 2>/dev/null || true
        done
        firewall-cmd --reload
      when: ansible_os_family == "RedHat"
      changed_when: true
