---
# Deploy Zero Trust DevSecOps mesh: per-tool Docker networks (100.64.0.0/10),
# UFW rules (no lateral movement), mTLS distribution, Gitea, n8n, Zammad.
# Requires: Docker, community.docker; for RHEL/Alma use firewalld (see os_hardening_fips).
- name: Provision Zero Trust DevSecOps mesh
  hosts: ai_mesh_nodes
  become: true
  vars:
    gitea_version: "1.21.4"
    n8n_version: "latest"
    zammad_image: "zammad/zammad-docker-compose:latest"
    tooling_gitea_cidr: "100.64.1.0/24"
    tooling_n8n_cidr: "100.64.2.0/24"
    tooling_zammad_cidr: "100.64.3.0/24"
    msg_backbone_cidr: "100.64.10.0/24"
    internal_range: "100.64.0.0/10"

  tasks:
    - name: Ensure secure directory structure
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0700'
        owner: root
      loop:
        - "/opt/mesh_secrets/certs"
        - "/opt/n8n/data"
        - "/opt/gitea/data"
        - "/opt/zammad/data"

    - name: Include mTLS distribution role
      ansible.builtin.include_role:
        name: mtls_distribution
      when: mtls_distribute | default(true) | bool

    - name: Create Docker network gitea_net
      community.docker.docker_network:
        name: gitea_net
        driver: bridge
        ipam_config:
          - subnet: "{{ tooling_gitea_cidr }}"

    - name: Create Docker network n8n_net
      community.docker.docker_network:
        name: n8n_net
        driver: bridge
        ipam_config:
          - subnet: "{{ tooling_n8n_cidr }}"

    - name: Create Docker network zammad_net
      community.docker.docker_network:
        name: zammad_net
        driver: bridge
        ipam_config:
          - subnet: "{{ tooling_zammad_cidr }}"

    - name: Create Docker network msg_backbone_net
      community.docker.docker_network:
        name: msg_backbone_net
        driver: bridge
        ipam_config:
          - subnet: "{{ msg_backbone_cidr }}"

    - name: UFW default deny incoming
      community.general.ufw:
        state: enabled
        direction: incoming
        policy: deny
      when: ansible_os_family == "Debian"

    - name: UFW allow from internal range (Solace, n8n, Gitea, Zammad, Teleport)
      community.general.ufw:
        rule: allow
        from_ip: "{{ internal_range }}"
        port: "{{ item }}"
        proto: tcp
      loop:
        - "22"
        - "3000"
        - "5678"
        - "55555"
        - "8008"
        - "8080"
        - "3023"
        - "3024"
        - "3025"
        - "80"
        - "443"
      when: ansible_os_family == "Debian"

    - name: Deploy Gitea container (gitea_net only)
      community.docker.docker_container:
        name: gitea_server
        image: "gitea/gitea:{{ gitea_version }}"
        restart_policy: unless-stopped
        networks:
          - name: gitea_net
        ports:
          - "3000:3000"
          - "2222:22"
        volumes:
          - "/opt/gitea/data:/data"
        env:
          USER_UID: "1000"
          USER_GID: "1000"
          GITEA__security__INSTALL_LOCK: "true"

    - name: Deploy n8n container (n8n_net only)
      community.docker.docker_container:
        name: n8n_orchestrator
        image: "n8nio/n8n:{{ n8n_version }}"
        restart_policy: unless-stopped
        networks:
          - name: n8n_net
        ports:
          - "5678:5678"
        volumes:
          - "/opt/n8n/data:/home/node/.n8n"
        env:
          N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
          WEBHOOK_URL: "http://n8n:5678"

    - name: Deploy Zammad (zammad_net only; app + postgres + redis via compose preferred)
      ansible.builtin.set_fact:
        zammad_deploy_standalone: false
      # Zammad full stack is better via docker-compose; this playbook creates the network.
      # Use devsecops-pipeline/docker-compose/docker-compose.zammad.yml for Zammad services.
