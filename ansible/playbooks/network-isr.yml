---
# Apply ISR baseline (inside subinterfaces, static routes, optional NAT).
# ansible-playbook -i inventory/network.example.yml playbooks/network-isr.yml
#
# Role path is explicit so ansible.cfg is not required (WSL /mnt/c is world-writable and Ansible ignores cfg).
- name: Configure Cisco ISR (IOS-XE)
  hosts: network_isr
  gather_facts: false
  roles:
    - role: "{{ playbook_dir }}/../roles/cisco_isr_platform"
