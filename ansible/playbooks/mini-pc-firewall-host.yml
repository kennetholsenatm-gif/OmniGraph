---
# Configure AlmaLinux + Incus on the bare-metal mini PC (after imaging or kickstart).
# See: deployments/mini-pc-firewall/README.md
#
#   cd ansible
#   ansible-playbook -i inventory/mini-pc-firewall.example.yml playbooks/mini-pc-firewall-host.yml -K

- name: Mini PC firewall host (Incus)
  hosts: mini_pc_firewall_hosts
  become: true
  gather_facts: true
  roles:
    - role: mini_pc_incus_host
