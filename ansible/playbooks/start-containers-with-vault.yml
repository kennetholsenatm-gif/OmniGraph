---
# Start DevSecOps stacks with env injected from HashiCorp Vault. No .env file.
# Run: VAULT_ADDR=http://vault:8200 VAULT_TOKEN=xxx ansible-playbook -i inventory.yml playbooks/start-containers-with-vault.yml
# Requires Vault CLI on controller; secrets are passed into containers by Ansible.
- name: Fetch secrets from HashiCorp Vault and start containers
  hosts: ai_mesh_nodes
  become: true
  vars:
    vault_secret_path: "secret/data/devsecops"
    vault_addr: "{{ lookup('env', 'VAULT_ADDR') }}"
    vault_token: "{{ lookup('env', 'VAULT_TOKEN') }}"
  tasks:
    - name: Fetch devsecops secrets from HashiCorp Vault
      ansible.builtin.command:
        cmd: "vault kv get -format=json {{ vault_secret_path }}"
      register: vault_result
      run_once: true
      delegate_to: localhost
      changed_when: false
      no_log: true
      environment:
        VAULT_ADDR: "{{ vault_addr | default(omit) }}"
        VAULT_TOKEN: "{{ vault_token | default(omit) }}"
      when: vault_addr is defined and vault_addr | length > 0 and vault_token is defined and vault_token | length > 0

    - name: Set devsecops_secrets on target hosts from Vault response
      ansible.builtin.set_fact:
        devsecops_secrets: "{{ (hostvars['localhost']['vault_result'].stdout | from_json).data.data | default({}) }}"
      when: vault_result is defined and vault_result.stdout is defined

    - name: Include devsecops_containers role (env injected into containers)
      ansible.builtin.include_role:
        name: devsecops_containers
      when: devsecops_secrets is defined and devsecops_secrets | length > 0
