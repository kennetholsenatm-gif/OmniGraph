[defaults]
# NOTE: On WSL + /mnt/c/, this directory is often world-writable — Ansible IGNORES this file.
# Use run-deploy-devsecops-lxc.sh or export ANSIBLE_CONFIG + ANSIBLE_ROLES_PATH.
# When honored (e.g. Linux ext4 clone), paths are relative to this file's directory.
inventory = ../inventory.yml
roles_path = ../roles
stdout_callback = yaml
