---
# Provision LXD instances and sync DevSecOps compose trees (Docker-in-LXC).
# Run from WSL/Linux where `lxc` is available.
#
# WSL + /mnt/c/: CWD is often world-writable — Ansible IGNORES ansible.cfg here. This play uses a
# path-based role (ansible/roles/...) so plain `ansible-playbook` still works. Optional: wrapper or
# ANSIBLE_CONFIG + ANSIBLE_ROLES_PATH for other playbooks / collections settings.
#
# Collections (paths are relative to CWD): from playbooks/ use -r ../collections/requirements.yml
#   ansible-galaxy collection install -r ../collections/requirements.yml
#
# IAM + messaging (from playbooks/); hypervisor tasks use become — add -K if sudo needs a password:
#   IMPORTANT: the path after -i is the INVENTORY FILE. Do not put -e between -i and that path.
#   Wrong:  ansible-playbook -K -i -e foo=true ../inventory/...  (Ansible uses "foo=true" as inventory)
#   Right:  ansible-playbook -K -i ../inventory/lxc.example.yml deploy-devsecops-lxc.yml -e foo=true
#
#   ansible-playbook -K -i ../inventory/lxc.example.yml deploy-devsecops-lxc.yml \
#     -e 'lxd_apply_names=["devsecops-iam","devsecops-messaging"]'
#
# WSL/Incus: instances often lack DNS until the bridge is fixed — optional copy host resolv.conf before dnf:
#   ansible-playbook -K -i ../inventory/lxc.example.yml deploy-devsecops-lxc.yml \
#     -e lxd_sync_host_resolv_conf=true \
#     -e 'lxd_apply_names=["devsecops-iam","devsecops-messaging"]'
#   ./run-deploy-devsecops-lxc.sh -i ../inventory/lxc.example.yml deploy-devsecops-lxc.yml ...  (for sudo password, prefer ansible-playbook -K ... or ansible.cfg become_ask_pass=true)
#
# From ansible/ (non-world-writable path or ANSIBLE_CONFIG set):
#   cd ansible && ansible-playbook -i inventory/lxc.example.yml playbooks/deploy-devsecops-lxc.yml \
#     -e 'lxd_apply_names=["devsecops-iam","devsecops-messaging"]'
#
# Optional compose up (after secrets-bootstrap inside each LXC):
#   ansible-playbook ... -e devsecops_lxc_compose_up=true
#
# become is only on systemd + incus/lxc tasks. If sudo needs a password: use ansible-playbook -K, OR run via ./run-deploy-devsecops-lxc.sh (sets ANSIBLE_CONFIG + ANSIBLE_BECOME_ASK_PASS), OR export ANSIBLE_BECOME_ASK_PASS=true. Otherwise sudo times out ("Timed out waiting for become success").

- name: DevSecOps stack on LXD (WSL2 / Alma path)
  hosts: lxd_hosts
  gather_facts: false
  tasks:
    # Path-based role: works when CWD ansible.cfg is ignored (world-writable /mnt/c/).
    - name: Apply lxd_devsecops_stack
      ansible.builtin.include_role:
        name: "{{ playbook_dir | dirname }}/roles/lxd_devsecops_stack"
      vars:
        devsecops_pipeline_root: "{{ playbook_dir | dirname | dirname }}"
