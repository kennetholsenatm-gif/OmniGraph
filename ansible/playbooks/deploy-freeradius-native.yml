---
# Native FreeRADIUS on Alma (dedicated LXC/VM). See ansible/roles/freeradius_alma/README.md
# Requires: freeradius_clients (and optional LDAP vars) via group_vars or -e @vault.yml
#
# Example:
#   ansible-playbook -i inventory/opennebula-hybrid.yml playbooks/deploy-freeradius-native.yml --limit devsecops-radius-01
- name: Deploy FreeRADIUS (Alma packages)
  hosts: freeradius_servers
  become: true
  roles:
    - role: freeradius_alma
