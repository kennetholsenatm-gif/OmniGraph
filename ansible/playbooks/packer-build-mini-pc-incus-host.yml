---
# Run Packer on the controller (Linux + KVM) to build the golden QCOW2.
# Does not run on Windows hosts without WSL/Linux.
#
#   cd ansible
#   ansible-playbook playbooks/packer-build-mini-pc-incus-host.yml
#
# Optional:
#   -e mini_packer_extra_args='-var=disk_size_gb=64'

- name: Build mini PC Incus host image with Packer
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    mini_packer_dir: "{{ playbook_dir }}/../../deployments/mini-pc-firewall/packer"
    mini_packer_extra_args: ""
  tasks:
    - name: Check packer
      ansible.builtin.command: packer version
      register: _packer_v
      changed_when: false

    - name: Show Packer version
      ansible.builtin.debug:
        msg: "{{ _packer_v.stdout_lines | default([]) }}"

    - name: Packer init
      ansible.builtin.command: packer init .
      args:
        chdir: "{{ mini_packer_dir }}"
      changed_when: true

    - name: Packer validate
      ansible.builtin.command: packer validate .
      args:
        chdir: "{{ mini_packer_dir }}"
      changed_when: false

    - name: Packer build
      ansible.builtin.shell: |
        set -euo pipefail
        cd "{{ mini_packer_dir }}"
        exec packer build -force . {{ mini_packer_extra_args | default('') | trim }}
      args:
        executable: /bin/bash
      changed_when: true
